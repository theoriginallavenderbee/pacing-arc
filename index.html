// ── TREND SUMMARY (v5.1) ──────────────────────────
function renderTrendSummary(){
  if(RECENT_DAYS.length<3)return "";
  const days=[...RECENT_DAYS].reverse(); // oldest first
  const maxEU=18;
  // stats
  const avgGate=days.map(d=>d.gate||"green");
  const redDays=avgGate.filter(g=>g==="red").length;
  const yellowDays=avgGate.filter(g=>g==="yellow").length;
  const dominated=redDays>2?"red":yellowDays>3?"yellow":"green";
  const withinBudget=days.filter(d=>(d.eu_used||0)<=(d.eu_budget||12)).length;
  const bestDay=days.reduce((a,b)=>(b.eu_budget||12)-(b.eu_used||0)>(a.eu_budget||12)-(a.eu_used||0)?b:a,days[0]);
  const hardestDay=days.reduce((a,b)=>(b.eu_used||0)/(b.eu_budget||12)>(a.eu_used||0)/(a.eu_budget||12)?b:a,days[0]);

  return `<div class="card in" style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h3>7-day summary</h3>
      <button id="btn-export" style="background:none;border:none;color:var(--accent);font-size:.72rem;cursor:pointer">Export CSV</button>
    </div>
    <div style="display:flex;gap:6px;align-items:flex-end;margin-bottom:12px;height:48px">
      ${days.map(d=>{
        const eu=d.eu_used||0,budget=d.eu_budget||12;
        const pct=Math.min(100,Math.round((eu/budget)*100));
        const col=pct<=80?"#34d399":pct<=100?"#fbbf24":"#f87171";
        const isToday=d.date===todayStr();
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
          <div style="width:100%;background:var(--bg3);border-radius:3px;height:40px;display:flex;align-items:flex-end">
            <div style="width:100%;height:${Math.max(6,pct*0.4)}px;background:${col};border-radius:3px;${isToday?"box-shadow:0 0 6px "+col+"88":""}"></div>
          </div>
          <div style="font-size:.55rem;color:var(--${isToday?"accent":"muted"})">${dayOfWeekShort(d.date).slice(0,1)}</div>
        </div>`;
      }).join("")}
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <span style="font-size:.72rem;color:var(--muted)">Gate avg: <span style="color:${dominated==="red"?"var(--red)":dominated==="yellow"?"var(--yellow)":"var(--green)"}">${gateEmoji(dominated)}</span></span>
      <span style="font-size:.72rem;color:var(--muted)">Within budget: ${withinBudget}/${days.length}</span>
      ${bestDay?`<span style="font-size:.72rem;color:var(--muted)">Best: ${dayOfWeekShort(bestDay.date)}</span>`:""}
      ${hardestDay?`<span style="font-size:.72rem;color:var(--muted)">Hardest: ${dayOfWeekShort(hardestDay.date)}</span>`:""}
      ${redDays?`<span style="font-size:.72rem;color:var(--red)">🔴 ${redDays} crash day${redDays>1?"s":""}</span>`:""}
    </div>
  </div>`;
}

            <div style="flex:1">
              <div style="font-size:.85rem;font-weight:500">${t.title}
                ${t.isOverdue?`<span style="font-size:.65rem;color:var(--red);margin-left:5px">overdue ${Math.floor(t.daysSince-t.frequency_days)}d</span>`:""}
                ${t.priority==="high"?`<span style="font-size:.65rem;color:var(--orange);margin-left:5px">↑ priority</span>`:""}
              </div>
              <div style="font-size:.72rem;color:var(--muted);margin-top:2px">${t.eu_cost} EU · last done: ${t.lastDone?t.lastDone:"never"}</div>
              ${t.notes?`<div style="font-size:.72rem;color:var(--subtle);margin-top:2px">${t.notes}</div>`:""}
              ${gateBlock?`<div style="font-size:.68rem;color:var(--red);margin-top:2px">Red gate — defer unless critical</div>`:""}
            </div>
            <button class="btn btn-primary maint-done" data-id="${t.id}" style="padding:6px 12px;font-size:.75rem;border-radius:8px;margin-left:10px;white-space:nowrap" ${canDo?"":"disabled"}>✓ Done</button>
          </div>
        </div>`;
      }).join("")}
    </div>`:`<div class="card in" style="margin-bottom:16px"><p style="font-size:.8rem;color:var(--green)">✓ No household tasks due — you're on top of it.</p></div>`}

    ${upcoming.length?`
    <div class="in">
      <h3 style="margin-bottom:10px">Upcoming</h3>
      ${upcoming.map(t=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <div>
            <span style="font-size:.8rem;color:var(--subtle)">${t.title}</span>
            <span style="font-size:.68rem;color:var(--muted);margin-left:8px">due in ${t.dueInDays}d</span>
          </div>
          <span style="font-size:.72rem;color:var(--muted)">${t.eu_cost} EU</span>
        </div>
      `).join("")}
    </div>`:""}

    <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)" class="in">
      <h3 style="margin-bottom:8px">Task info</h3>
      <p style="font-size:.75rem;color:var(--muted);line-height:1.6">Tasks are pre-loaded with suggested frequencies. Log "Done" to reset the timer. Red gate days show high-priority tasks only. Tasks are stored locally — they survive app reloads but not device switches.</p>
    </div>
  </div>`;
}


// ═══════════════════════════════════════════════════
// MEALS TAB (v6.1)
// ═══════════════════════════════════════════════════
function renderMeals(){
  const tab = S.meal_tab || "overview";
  const hasData = hasPantryData();
  const locations = getPantryLocations();

  const subTabs = [
    {id:"overview", label:"Use soon"},
    {id:"audit", label:"Audit"},
    {id:"components", label:"Ready-made"},
    {id:"prompt", label:"Get plan"}
  ];

  const subNav = `<div style="display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px">
    ${subTabs.map(t=>`<button class="meal-tab-btn${tab===t.id?" active":""}" data-meal-tab="${t.id}" style="padding:6px 14px;border-radius:20px;font-size:.75rem;font-weight:500;white-space:nowrap;background:${tab===t.id?"var(--accent)":"var(--bg3)"};color:${tab===t.id?"#fff":"var(--muted)"};border:1px solid ${tab===t.id?"var(--accent)":"var(--border)"}!important;cursor:pointer">${t.label}</button>`).join("")}
  </div>`;

  let body = "";

  // ── OVERVIEW: urgency-first meal planning view ────
  if(tab === "overview"){
    if(!hasData){
      body = `<div class="card in" style="margin-bottom:16px;text-align:center;padding:24px">
        <div style="font-size:1.8rem;margin-bottom:10px">🍱</div>
        <h2 style="font-size:1rem;margin-bottom:8px">Meal planning</h2>
        <p style="font-size:.8rem;color:var(--muted);margin-bottom:16px;line-height:1.6">Add your pantry ingredients and ready-made components, then generate a Claude meal plan prompt tailored to your energy today.</p>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="btn btn-primary meal-tab-btn" data-meal-tab="audit">🛒 Start pantry audit</button>
          <p style="font-size:.72rem;color:var(--muted)">Takes about 10 min · 2 EU · execution mode</p>
        </div>
      </div>`;
    } else {
      // Build urgency-sorted list: components + ingredients, urgent → soon → normal
      const allItems = [
        ...READY_COMPONENTS.map(c=>({...c, _type:"component", _tier:getUrgencyTier(c)})),
        ...INGREDIENT_INVENTORY.map(i=>({...i, _type:"ingredient", _tier:getUrgencyTier(i)}))
      ];
      const urgent = allItems.filter(x=>x._tier==="urgent");
      const soon   = allItems.filter(x=>x._tier==="soon");
      const normal = allItems.filter(x=>x._tier==="normal");

      const renderMealItem = (item) => {
        const isComp = item._type==="component";
        const urgCol = item._tier==="urgent"?"var(--red)":item._tier==="soon"?"var(--orange)":"var(--muted)";
        const urgLabel = item._tier==="urgent"
          ? `<span style="font-size:.6rem;color:var(--red);background:rgba(248,113,113,.12);padding:1px 5px;border-radius:4px">urgent</span>`
          : item._tier==="soon"
          ? `<span style="font-size:.6rem;color:var(--orange);background:rgba(251,146,60,.12);padding:1px 5px;border-radius:4px">use soon</span>`
          : "";
        if(isComp){
          return `<div class="card-sm in" style="margin-bottom:6px;background:rgba(167,139,250,.05);border-color:rgba(167,139,250,.2)">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div style="flex:1">
                <div style="font-size:.82rem;font-weight:500">${escH(item.name)} ${urgLabel}
                  <span style="font-size:.6rem;color:#a78bfa;background:rgba(167,139,250,.1);padding:1px 5px;border-radius:4px;margin-left:2px">ready to use</span>
                </div>
                <div style="font-size:.72rem;color:var(--muted);margin-top:2px">${item.servings_remaining} servings · ${item.eu_to_use} EU to assemble${item.days_to_expiry!=null?` · <span style="color:${urgCol}">${item.days_to_expiry}d</span>`:""}</div>
              </div>
              <button class="btn-ghost comp-use" data-id="${item.id}" style="font-size:.75rem;padding:4px 8px;color:var(--green)" title="Use one serving">−1</button>
            </div>
          </div>`;
        } else {
          return `<div class="card-sm in" style="margin-bottom:6px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div style="flex:1">
                <div style="font-size:.82rem;font-weight:500">${escH(item.name)} ${urgLabel}</div>
                <div style="font-size:.72rem;color:var(--muted);margin-top:2px">${item.quantity||""} · ${item.location||""}${item.days_to_expiry!=null?` · <span style="color:${urgCol}">${item.days_to_expiry}d</span>`:""}</div>
              </div>
            </div>
          </div>`;
        }
      };

      const sections = [];
      if(urgent.length) sections.push(`<div style="margin-bottom:14px"><h3 style="color:var(--red);margin-bottom:8px">⚠ Use now (${urgent.length})</h3>${urgent.map(renderMealItem).join("")}</div>`);
      if(soon.length)   sections.push(`<div style="margin-bottom:14px"><h3 style="color:var(--orange);margin-bottom:8px">⏳ Use soon (${soon.length})</h3>${soon.map(renderMealItem).join("")}</div>`);
      if(normal.length) sections.push(`<div style="margin-bottom:14px"><h3 style="color:var(--muted);margin-bottom:8px">✓ In stock (${normal.length})</h3>${normal.map(renderMealItem).join("")}</div>`);

      body = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <p style="font-size:.78rem;color:var(--muted);margin:0">${INGREDIENT_INVENTORY.length} ingredients · ${READY_COMPONENTS.length} ready-made</p>
          <button class="btn btn-primary meal-tab-btn" data-meal-tab="prompt" style="padding:6px 12px;font-size:.76rem">🌿 Get meal plan</button>
        </div>
        ${sections.length ? sections.join("") : `<div class="card" style="text-align:center;padding:20px;color:var(--muted);font-size:.8rem">Everything looks fine — nothing urgent right now.</div>`}`;
    }
  }

  // ── AUDIT: location-based spatial view (v9.3: search, collapse-all) ──
  if(tab === "audit"){
    const sessionActive = S.audit_session_active;
    const confirmed     = S.audit_session_confirmed||{};
    const confirmedCount = Object.keys(confirmed).length;
    const auditSearch   = (S.audit_search||"").toLowerCase().trim();

    const urgBadge = item => {
      const t = getUrgencyTier(item);
      if(t==="urgent") return `<span style="font-size:.6rem;color:var(--red);background:rgba(248,113,113,.12);padding:1px 5px;border-radius:4px">urgent</span>`;
      if(t==="soon")   return `<span style="font-size:.6rem;color:var(--orange);background:rgba(251,146,60,.12);padding:1px 5px;border-radius:4px">soon</span>`;
      return "";
    };
    const expiryBit = item => {
      if(item.days_to_expiry==null) return "";
      const t = getUrgencyTier(item);
      const col = t==="urgent"?"var(--red)":t==="soon"?"var(--orange)":"var(--muted)";
      return ` · <span style="color:${col}">${item.days_to_expiry}d</span>`;
    };

    const locationSections = locations.map(loc => {
      const allItems = INGREDIENT_INVENTORY
        .filter(i => (i.location||"")=== loc)
        .sort((a,b) => {
          const ord={urgent:0,soon:1,normal:2};
          return (ord[getUrgencyTier(a)]||2)-(ord[getUrgencyTier(b)]||2);
        });
      const filtered = auditSearch ? allItems.filter(i=>i.name.toLowerCase().includes(auditSearch)) : allItems;
      if(auditSearch && filtered.length===0) return ""; // hide empty sections during search
      const isExpanded = auditSearch ? true : (S.audit_expanded_locations[loc]!==false);
      const urgentCount = allItems.filter(i=>getUrgencyTier(i)==="urgent").length;
      const soonCount   = allItems.filter(i=>getUrgencyTier(i)==="soon").length;
      const display     = auditSearch ? filtered : allItems;

      return `<div class="card in" style="margin-bottom:10px;padding:0;overflow:hidden">
        <div class="audit-loc-header" data-loc="${escH(loc)}" style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;background:${isExpanded?"var(--bg2)":"var(--bg3)"}">
          <div>
            <span style="font-size:.88rem;font-weight:500">${escH(loc)}</span>
            <span style="font-size:.72rem;color:var(--muted);margin-left:8px">${auditSearch ? filtered.length+"/"+allItems.length : allItems.length} item${allItems.length!==1?"s":""}</span>
            ${urgentCount ? `<span style="font-size:.65rem;color:var(--red);margin-left:6px">● ${urgentCount} urgent</span>` : ""}
            ${soonCount&&!urgentCount ? `<span style="font-size:.65rem;color:var(--orange);margin-left:6px">● ${soonCount} soon</span>` : ""}
          </div>
          <span style="font-size:.8rem;color:var(--muted)">${isExpanded?"↑":"↓"}</span>
        </div>
        ${isExpanded ? `<div style="padding:0 14px 12px">
          ${display.length===0
            ? `<div style="padding:10px 0;font-size:.78rem;color:var(--muted);text-align:center">Nothing stored here</div>`
            : display.map(item => {
                const isConf = !!confirmed[item.id];
                return `<div class="audit-item" data-id="${item.id}" style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);gap:8px">
                  <div style="flex:1;min-width:0">
                    <div style="font-size:.82rem;font-weight:500;${isConf?"opacity:.55;text-decoration:line-through":""}">${escH(item.name)} ${urgBadge(item)}</div>
                    <div style="font-size:.7rem;color:var(--muted);margin-top:1px">${escH(item.quantity||"")}${item.unopened_units>0?` · <span style="color:var(--muted)">+${item.unopened_units} unopened</span>`:""}${expiryBit(item)}</div>
                  </div>
                  <div style="display:flex;gap:4px;flex-shrink:0">
                    ${sessionActive ? `<button class="audit-confirm" data-id="${item.id}" style="background:${isConf?"rgba(52,211,153,.2)":"var(--bg3)"};border:1px solid ${isConf?"rgba(52,211,153,.4)":"var(--border)"}!important;color:${isConf?"var(--green)":"var(--muted)"};font-size:.72rem;padding:4px 8px;border-radius:7px;cursor:pointer">${isConf?"✓ here":"confirm"}</button>` : ""}
                    <button class="btn-ghost ing-edit" data-id="${item.id}" style="font-size:.8rem;padding:4px 7px;color:var(--muted)" title="Edit">✏</button>
                    <button class="btn-ghost ing-delete" data-id="${item.id}" style="font-size:.8rem;padding:4px 7px;color:var(--muted)" title="Delete">×</button>
                  </div>
                </div>`;
              }).join("")
          }
        </div>` : ""}
      </div>`;
    }).filter(Boolean);

    const unknownItems = INGREDIENT_INVENTORY.filter(i=>!i.location||!locations.includes(i.location));
    const unknownFiltered = auditSearch ? unknownItems.filter(i=>i.name.toLowerCase().includes(auditSearch)) : unknownItems;
    const unknownSection = unknownFiltered.length ? `<div class="card in" style="margin-bottom:10px;border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.03)">
      <div style="padding:10px 14px;font-size:.8rem;font-weight:500;color:var(--yellow)">⚠ Location unknown (${unknownFiltered.length})</div>
      <div style="padding:0 14px 12px">${unknownFiltered.map(item=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:.8rem">
        <span>${escH(item.name)}</span>
        <button class="btn-ghost ing-edit" data-id="${item.id}" style="font-size:.8rem;padding:3px 7px;color:var(--accent)">assign location</button>
      </div>`).join("")}</div>
    </div>` : "";

    // v9.3: search bar
    const searchBar = `<div style="position:relative;margin-bottom:8px">
      <input type="search" id="audit-search-input" class="text-in" style="width:100%;font-size:.82rem;padding-left:32px" placeholder="Search all locations…" value="${escH(auditSearch)}"/>
      <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none">🔍</span>
      ${auditSearch ? `<button id="audit-search-clear" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem">×</button>` : ""}
    </div>`;
    // v9.3: collapse / expand all
    const collapseBar = `<div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">
      <button id="btn-expand-all" style="background:none;border:none;color:var(--muted);font-size:.72rem;cursor:pointer;padding:0">Expand all</button>
      <span style="color:var(--border);font-size:.8rem">·</span>
      <button id="btn-collapse-all" style="background:none;border:none;color:var(--muted);font-size:.72rem;cursor:pointer;padding:0">Collapse all</button>
      <span style="flex:1"></span>
      <span style="font-size:.7rem;color:var(--muted)">${INGREDIENT_INVENTORY.length} items total</span>
    </div>`;

    const sessionControls = sessionActive
      ? `<div style="display:flex;gap:8px;margin-bottom:10px">
          <div style="flex:1;background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.25);border-radius:10px;padding:8px 12px;font-size:.78rem;color:var(--green)">
            ✓ Audit in progress — ${confirmedCount} confirmed
          </div>
          <button id="btn-finish-audit" class="btn btn-secondary" style="font-size:.76rem;padding:7px 12px;white-space:nowrap">Finish</button>
        </div>`
      : `<div style="display:flex;gap:8px;margin-bottom:10px">
          <button id="btn-start-audit" class="btn btn-secondary" style="flex:1;font-size:.78rem">Start audit session</button>
          <button id="btn-quick-add" class="btn btn-primary" style="flex:1;font-size:.78rem">⚡ Quick-add</button>
          <button id="btn-add-ingredient" class="btn btn-secondary" style="flex:0;padding:7px 12px;font-size:.78rem">+</button>
        </div>`;

    body = sessionControls + searchBar + collapseBar + locationSections.join("") + unknownSection;
  }

  // ── COMPONENTS: ready-made items ─────────────────
  if(tab === "components"){
    const byType = {};
    READY_COMPONENTS.forEach(c => {
      if(!byType[c.component_type]) byType[c.component_type] = [];
      byType[c.component_type].push(c);
    });
    const types = Object.keys(byType).sort();

    body = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="font-size:.8rem;color:var(--muted)">${READY_COMPONENTS.length} component${READY_COMPONENTS.length!==1?"s":""}</div>
        <button id="btn-add-component" class="btn btn-primary" style="padding:7px 14px;font-size:.78rem">+ Add component</button>
      </div>
      ${READY_COMPONENTS.length === 0 ? `<div class="card" style="text-align:center;padding:20px;color:var(--muted);font-size:.8rem">
        No ready-made components yet. Add cooked items that are ready to assemble into meals.
      </div>` : types.map(type => `
        <div style="margin-bottom:16px">
          <h3 style="margin-bottom:8px">${type}</h3>
          ${byType[type].map(c => `<div class="card-sm in" style="margin-bottom:6px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div style="flex:1">
                <div style="font-size:.82rem;font-weight:500">${escH(c.name)}
                  ${c.urgency==="urgent" ? `<span style="font-size:.6rem;color:var(--red);margin-left:4px;background:rgba(248,113,113,.12);padding:1px 5px;border-radius:4px">urgent</span>` : ""}
                </div>
                <div style="font-size:.72rem;color:var(--muted);margin-top:2px">${c.servings_remaining} servings · ${c.eu_to_use} EU to assemble${c.days_to_expiry!=null?` · <span style="color:${c.days_to_expiry<=2?"var(--red)":"var(--muted)"}">${c.days_to_expiry}d</span>`:""}</div>
              </div>
              <div style="display:flex;gap:6px">
                <button class="btn-ghost comp-use" data-id="${c.id}" style="font-size:.75rem;padding:4px 8px;color:var(--green)" title="Use one serving">−1</button>
                <button class="btn-ghost comp-edit" data-id="${c.id}" style="font-size:.8rem;padding:4px 8px;color:var(--muted)">✏</button>
                <button class="btn-ghost comp-delete" data-id="${c.id}" style="font-size:.8rem;padding:4px 8px;color:var(--muted)">×</button>
              </div>
            </div>
          </div>`).join("")}
        </div>
      `).join("")}`;
  }

  // ── PROMPT: generate meal plan (v9.3) ─────────────
  if(tab === "prompt"){
    // No-prep list: shelf-stable/canned/frozen items in pantry
    const noPrepItems = INGREDIENT_INVENTORY
      .filter(i => ["shelf-stable","canned","frozen"].includes(i.form||""))
      .slice(0, 8);

    const moodOpts = ["warm","cold","salty","savoury","sweet","light","filling"];
    const selMood  = S.meal_mood||null;
    const gotoMeals = S.goto_meals||[];
    const gateNow   = S.gate||"green";

    const moodBar = `<div class="card in" style="margin-bottom:14px">
      <h3 style="margin-bottom:8px">What feels right to eat? <span style="font-size:.72rem;color:var(--muted);font-weight:400">optional</span></h3>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${moodOpts.map(m => {
          const sel = selMood===m;
          return `<button class="meal-mood-btn tag${sel?" sel":""}" data-mood="${m}" style="padding:5px 12px;font-size:.76rem;border-radius:20px;cursor:pointer;background:${sel?"var(--accent)":"var(--bg3)"};color:${sel?"#fff":"var(--muted)"};border:1px solid ${sel?"var(--accent)":"var(--border)"}!important">${m}</button>`;
        }).join("")}
        ${selMood ? `<button id="meal-mood-clear" style="background:none;border:none;color:var(--muted);font-size:.75rem;cursor:pointer;padding:4px 8px">clear</button>` : ""}
      </div>
    </div>`;

    const gotoSection = gotoMeals.length
      ? `<div class="card in" style="margin-bottom:14px${gateNow==="red"?";border-color:rgba(248,113,113,.25);background:rgba(248,113,113,.03)":""}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <h3 style="font-size:.88rem">My reliable meals</h3>
            <button id="btn-add-goto-meal" style="background:none;border:none;color:var(--accent);font-size:.76rem;cursor:pointer">+ add</button>
          </div>
          ${gateNow==="red" ? `<p style="font-size:.72rem;color:var(--muted);margin-bottom:8px">Red day — low-effort defaults, no decision needed.</p>` : ""}
          ${gotoMeals.map((m,idx) => `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
            <div>
              <div style="font-size:.82rem;font-weight:500">${escH(m.name)}</div>
              <div style="font-size:.7rem;color:var(--muted)">${m.eu ? m.eu+" EU · " : ""}${escH(m.notes||"")}</div>
            </div>
            <button class="goto-meal-remove" data-idx="${idx}" style="background:none;border:none;color:var(--muted);font-size:.9rem;cursor:pointer;padding:4px 8px">×</button>
          </div>`).join("")}
        </div>`
      : `<div class="card in" style="margin-bottom:14px;background:rgba(56,189,248,.03)">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-size:.84rem;font-weight:500">My reliable meals</div>
              <div style="font-size:.74rem;color:var(--muted);margin-top:3px">Add your go-to options — prioritised on red days.</div>
            </div>
            <button id="btn-add-goto-meal" class="btn btn-secondary" style="font-size:.76rem;padding:6px 12px;white-space:nowrap">+ Add</button>
          </div>
        </div>`;

    const basePrompt  = S.meal_prompt || generateMealPrompt();
    if(!S.meal_prompt) S.meal_prompt = basePrompt + (selMood ? `

Mood preference: ${selMood} food today.` : "");
    const prompt = S.meal_prompt;

    body = moodBar + gotoSection + `
      <div class="card in" style="margin-bottom:14px">
        <h3 style="margin-bottom:8px">Your meal plan prompt</h3>
        <p style="font-size:.78rem;color:var(--muted);margin-bottom:12px;line-height:1.6">Copy and paste into a new Claude.ai conversation for a burst-sequenced meal plan.</p>

// ── QUICK-ADD PANEL (v7.0) ────────────────────────────
function parseQuickAddInput(raw){
  // Parse: "name" | "name, location, N days" | "name, location, Nkg/g/etc"
  const parts = raw.split(",").map(p=>p.trim()).filter(Boolean);
  const name = parts[0]||"";
  let location=null, expiry_days=null, quantity=null;
  const locs=["fridge","freezer","pantry","counter"];
  for(let i=1;i<parts.length;i++){
    const p=parts[i].toLowerCase();
    if(locs.includes(p)){ location=p; continue; }
    const dayMatch=p.match(/^(\d+)\s*d(ay)?s?$/); if(dayMatch){ expiry_days=Number(dayMatch[1]); continue; }
    const qtyMatch=p.match(/^[\d.]+\s*(g|kg|ml|l|oz|lb|x|pack|bag|tin|can|bottle|tray|bunch|head)?$/i); if(qtyMatch){ quantity=parts[i]; continue; }
    if(!quantity) quantity=parts[i];
  }
  const expiry_date = expiry_days!=null ? expiryDateFromDays(expiry_days) : null;
  const days_to_expiry = expiry_date ? daysFromExpiryDate(expiry_date) : null;
  const missing=[];
  if(!location) missing.push("location");
  if(!expiry_date) missing.push("expiry");
  if(!quantity) missing.push("quantity");
  return {
    id: mealDataId(), name, category:"other", form:"fresh",
    quantity:quantity||"", location:location||"", expiry_date, days_to_expiry,
    urgency:(days_to_expiry!=null&&days_to_expiry<=3)?"urgent":"normal",
    high_fructan:false, omega_ratio:"unknown",
    _missing: missing
  };
}

function bindBlockEditSheet(){
  if(!S.show_block_edit) return;
  document.getElementById("close-block-edit")?.addEventListener("click",()=>{S.show_block_edit=false;S.block_edit=null;render();});
  document.getElementById("block-edit-overlay")?.addEventListener("click",e=>{if(e.target.id==="block-edit-overlay"){S.show_block_edit=false;S.block_edit=null;render();}});
  document.getElementById("save-block-edit")?.addEventListener("click",()=>{
    const b=S.block_edit; if(!b)return;
    const title=document.getElementById("be-title")?.value?.trim()||b.title;
    const start_time=document.getElementById("be-time")?.value||null;
    const eu_cost=Number(document.getElementById("be-eu")?.value)||0;
    const layer=document.getElementById("be-layer")?.value||b.layer;
    S.canvas_blocks=(S.canvas_blocks||[]).map(bl=>bl.id===b.id?{...bl,title,start_time,eu_cost,layer}:bl);
    S.show_block_edit=false;S.block_edit=null;
    render();saveCanvasBlocks();
  });
  document.getElementById("delete-block-edit")?.addEventListener("click",()=>{
    const b=S.block_edit; if(!b)return;
    if(b.layer==="rock"&&!confirm(`Remove "${b.title}"?`))return;
    S.canvas_blocks=(S.canvas_blocks||[]).filter(bl=>bl.id!==b.id);
    S.show_block_edit=false;S.block_edit=null;
    render();saveCanvasBlocks();
  });
}

function bindPoolVariantSheet(){
  if(!S.pool_variant_pick) return;
  document.getElementById("close-variant-sheet")?.addEventListener("click",()=>{S.pool_variant_pick=null;render();});
  document.getElementById("variant-sheet-overlay")?.addEventListener("click",e=>{if(e.target.id==="variant-sheet-overlay"){S.pool_variant_pick=null;render();}});
  document.querySelectorAll(".variant-pick-btn").forEach(btn=>btn.addEventListener("click",()=>{
    const item=S.pool_variant_pick;
    if(!item)return;
    const eu=Number(btn.dataset.eu);
    const key=btn.dataset.key;
    const tiers=item.variants||[];
    const picked=tiers.find(v=>v.key===key)||tiers[0];
    const newBlock={
      id:"placed_"+Date.now(),
      title:item.title+(picked.label&&picked.label!==item.title?` (${picked.label})`:""),
      layer:item.layer, eu_cost:eu,
      return_eu:item.return_eu||0, return_note:item.return_note||"",
      restorative:item.restorative||false,
      start_time:null, duration_mins:Math.round(eu*25)||20,
      tethered:false, done:false,
    };
    const newBlocks=[...(S.canvas_blocks||[]),newBlock];
    if(item.layer!=="gap"&&item.layer!=="water"&&item.layer!=="sand"&&eu>=1){
      newBlocks.push({id:"auto_gap_"+Date.now(),title:"Rest gap (auto)",layer:"pebble",eu_cost:0,return_eu:0,return_note:"",restorative:false,start_time:null,duration_mins:GAP_DEFAULT_MINS,tethered:false,done:false});
    }
    S.canvas_blocks=newBlocks;
    S.pool_variant_pick=null;
    render(); saveCanvasBlocks();
  }));
  document.getElementById("variant-add-default")?.addEventListener("click",()=>{
    const item=S.pool_variant_pick;
    if(!item)return;
    S.pool_variant_pick=null;
    const newBlock={id:"placed_"+Date.now(),title:item.title,layer:item.layer,eu_cost:item.eu_cost,return_eu:item.return_eu||0,return_note:item.return_note||"",restorative:item.restorative||false,start_time:null,duration_mins:item.duration_mins||30,tethered:false,done:false};
    S.canvas_blocks=[...(S.canvas_blocks||[]),newBlock];
    render(); saveCanvasBlocks();
  });
}

async function callCompanionAPI(messages, systemPrompt){
  const apiKey = localStorage.getItem("pac_api_key");
  if(!apiKey) throw new Error("No API key configured. Add it in Settings → AI companion.");
  const resp = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      system: systemPrompt||buildCompanionSystemPrompt(),
      messages
    })
  });
  if(!resp.ok){const e=await resp.text().catch(()=>"");throw new Error(`API ${resp.status}: ${e}`);}
  const data = await resp.json();
  return data.content?.find(c=>c.type==="text")?.text||"";
}

function bindCompanionPanel(){
  if(!S.ai_companion_open) return;
  document.getElementById("close-companion")?.addEventListener("click",()=>{S.ai_companion_open=false;render();});
  document.getElementById("clear-friction-log")?.addEventListener("click",()=>{S.ai_friction_log=[];render();showToast("Friction log cleared");});
  document.getElementById("companion-overlay")?.addEventListener("click",e=>{if(e.target.id==="companion-overlay"){S.ai_companion_open=false;render();}});

  async function saveCompanionState(){
    try{
      await sbUpsert("pacing_arc",{
        device_id:DEVICE_ID(), date:"companion",
        companion_state:{friction_log:S.ai_friction_log||[],messages:(S.ai_messages||[]).slice(-20)},
        updated_at:new Date().toISOString()
      });
    }catch{}
  }

  async function sendMsg(text){
    if(!text?.trim())return;
    if(!aiEnabled()){showToast("Add API key in Settings → AI companion","red");return;}
    S.ai_messages=[...(S.ai_messages||[]),{role:"user",content:text}];
    S.ai_thinking=true; render();
    try{
      const ctx=buildCompanionContext();
      const sysPrompt=buildCompanionSystemPrompt()+"\n\nCurrent context:\n"+ctx;
      const reply=await callCompanionAPI(S.ai_messages.slice(-10).map(m=>({role:m.role,content:m.content})),sysPrompt);
      S.ai_messages=[...S.ai_messages,{role:"assistant",content:reply}];
    }catch(e){
      S.ai_messages=[...S.ai_messages,{role:"assistant",content:"⚠ "+e.message}];
    }
    S.ai_thinking=false; render();
    saveCompanionState();
    setTimeout(()=>{const el=document.getElementById("companion-msgs");if(el)el.scrollTop=el.scrollHeight;},50);
  }

  document.getElementById("companion-send")?.addEventListener("click",()=>{
    const inp=document.getElementById("companion-input");
    const text=inp?.value?.trim(); if(inp)inp.value="";
    sendMsg(text);
  });
  document.getElementById("companion-input")?.addEventListener("keydown",e=>{
    if(e.key==="Enter"&&!e.shiftKey){
      e.preventDefault();
      const inp=e.target; const text=inp.value.trim(); inp.value="";
      sendMsg(text);
    }
  });

  document.querySelectorAll(".companion-quick").forEach(btn=>btn.addEventListener("click",async()=>{
    const action=btn.dataset.action;
    if(action==="friction"){
      const text=prompt("What's causing friction or feels wrong?");
      if(!text)return;
      // v10.4 Part 9c: detect tech issues and gather triage info
      const techKeywords=["not working","broken","won't","can't","sync","disappeared","error","doesn't","didn't","lost","wrong","missing"];
      const isTech=techKeywords.some(kw=>text.toLowerCase().includes(kw));
      if(isTech){
        const device=prompt("Which device? (Phone / Laptop / Both)")?.trim()||"unknown";
        const context=prompt("What were you doing?")?.trim()||"";
        const ongoing=confirm("Is this still happening now?")?"Yes":"No";
        const entry={type:"tech",description:text,device,context,ongoing,ts:Date.now()};
        S.ai_friction_log=[...(S.ai_friction_log||[]),entry];
        showToast("✓ Tech issue logged — structured for debugging","green");
      } else {
        S.ai_friction_log=[...(S.ai_friction_log||[]),{text,ts:Date.now()}];
        showToast("✓ Friction logged","green");
      }
      render();
      saveCompanionState();
      return;
    }
    if(action==="briefing"){
      sendMsg("Give me a morning briefing based on today's data. What does today look like, what are the key risks, and what should I watch for?");
      return;
    }
    if(action==="brief-gen"){
      if(!aiEnabled()){showToast("Add API key in Settings → AI companion","red");return;}
      S.ai_thinking=true; render();
      try{
        const ctx=buildCompanionContext();
        const friction=(S.ai_friction_log||[]).map((f,i)=>`${i+1}. ${f.text}`).join("\n")||"None logged.";
        const sysPrompt=`You are helping generate a structured build brief for a developer working on Pacing Arc (an ME/CFS pacing PWA). Format it as markdown with clear sections. Be specific and actionable.`;
        const prompt=`Based on the following friction notes and app context, generate a structured build brief for the next developer session:\n\nFriction log:\n${friction}\n\nApp context:\n${ctx}\n\nGenerate a brief with: Summary of issues, Priority order, Specific items to fix, Any questions that need answering first.`;
        const reply=await callCompanionAPI([{role:"user",content:prompt}],sysPrompt);
        S.ai_messages=[...(S.ai_messages||[]),{role:"assistant",content:"📋 Build brief generated:\n\n"+reply}];
        if(confirm("Brief generated! Clear the friction log?")){S.ai_friction_log=[];}
      }catch(e){
        S.ai_messages=[...(S.ai_messages||[]),{role:"assistant",content:"⚠ Brief generation failed: "+e.message}];
      }
      S.ai_thinking=false; render();
    }
  }));

  setTimeout(()=>{const el=document.getElementById("companion-msgs");if(el)el.scrollTop=el.scrollHeight;},100);
}

function bindSettings(){
  document.getElementById("settings-back")?.addEventListener("click",()=>{S.screen="home";render();});
  document.querySelectorAll(".s-severity").forEach(b=>b.addEventListener("click",()=>{
    if(!PROFILE)PROFILE={};PROFILE.severity=b.dataset.v;render();
  }));
  document.getElementById("s-save")?.addEventListener("click",async()=>{
    PROFILE={
      name:document.getElementById("s-name").value,
      age:document.getElementById("s-age").value||40,
      at_override:document.getElementById("s-at").value,
      severity:PROFILE&&PROFILE.severity||"Moderate — significantly limited",
      supplements:document.getElementById("s-supps").value,
      cycle_length:document.getElementById("s-cycle").value||28,
      last_period_start:document.getElementById("s-period").value||"",
      bb_low:Number(document.getElementById("s-bb-low")?.value)||5,
      bb_high:Number(document.getElementById("s-bb-high")?.value)||65,
      sleep_onset_mins:Number(document.getElementById("s-onset")?.value)||30,
      time_in_bed_hours:Number(document.getElementById("s-tib")?.value)||8.5,
      functional_buffer_mins:Number(document.getElementById("s-buffer-mins")?.value)||45,
      winddown_mins:Number(document.getElementById("s-winddown")?.value)||75,
      // v9.2 — pantry locations
      pantry_locations: Array.from(document.querySelectorAll(".pantry-loc-input"))
        .map(inp=>inp.value.trim()).filter(Boolean),
      // v10.2 — Garmin calibration baselines
      garmin_baseline_bb_recharge: Number(document.getElementById("s-garmin-bb")?.value)||null,
      garmin_baseline_hrv: Number(document.getElementById("s-garmin-hrv")?.value)||null,
    };
    try{
      await sbSaveProfile(PROFILE);
      SYNC_STATUS="ok";
      showToast("✓ Profile saved to Supabase","green");
    }catch(e){
      SYNC_STATUS="off";
      localStorage.setItem("pac_profile",JSON.stringify(PROFILE));
      console.error("[PacingArc] Profile save FAILED:",e.message);
      showToast("⚠ Supabase save failed — saved locally only\n"+e.message,"red");
    }
    S.screen="home";render();
  });
  document.getElementById("s-enable-notif")?.addEventListener("click",()=>requestNotifPermission());
  document.getElementById("s-save-notif")?.addEventListener("click",()=>{
    const ns={
      morning_time:document.getElementById("s-notif-morning")?.value||"08:00",
      evening_time:document.getElementById("s-notif-evening")?.value||"18:00",
      mhmr:document.getElementById("s-notif-mhmr")?.checked!==false,
      event:document.getElementById("s-notif-event")?.checked!==false,
    };
    localStorage.setItem("pac_notif",JSON.stringify(ns));
    scheduleNotifications();
    alert("Notification settings saved.");
  });
  document.getElementById("s-copy-device")?.addEventListener("click",()=>{
    navigator.clipboard.writeText(DEVICE_ID()).then(()=>{
      document.getElementById("s-copy-device").textContent="Copied!";
      setTimeout(()=>{const el=document.getElementById("s-copy-device");if(el)el.textContent="Copy";},2000);
    }).catch(()=>{
      document.getElementById("s-device-display").select();
      document.execCommand("copy");
    });
  });
  document.getElementById("s-switch-device")?.addEventListener("click",()=>{
    const newId=document.getElementById("s-device-new")?.value?.trim();
    if(!newId){alert("Please enter a device ID.");return;}
    if(confirm("Switch to device ID: "+newId+"?\n\nThis will reload the app and use that device's data.")){
      localStorage.setItem("pac_device_id",newId);
      window.location.reload();
    }
  });
  document.getElementById("s-export")?.addEventListener("click",exportData);
  // AI companion settings
  const apiKeyInput = document.getElementById("s-api-key");
  const aiEnabledCheck = document.getElementById("s-ai-enabled");
  if(apiKeyInput) apiKeyInput.value = localStorage.getItem("pac_api_key")||"";
  if(aiEnabledCheck) aiEnabledCheck.checked = localStorage.getItem("pac_ai_enabled")==="true";
  document.getElementById("s-save-api")?.addEventListener("click",()=>{
    const key = (apiKeyInput?.value||"").trim();
    const enabled = aiEnabledCheck?.checked||false;
    if(key) localStorage.setItem("pac_api_key", key);
    else localStorage.removeItem("pac_api_key");
    localStorage.setItem("pac_ai_enabled", enabled?"true":"false");
    showToast(key?"API key saved ✓":"API key cleared","green");
  });
  document.getElementById("s-reset")?.addEventListener("click",()=>{
    if(confirm("Reset all local data?")){localStorage.clear();PROFILE=null;S.screen="setup";S.setup_step=0;S.setup_data={};render();}
  });

  // v9.2 — Add pantry location
  document.getElementById("btn-add-pantry-loc")?.addEventListener("click",()=>{
    const list=document.getElementById("pantry-loc-list");
    if(!list)return;
    const idx=list.querySelectorAll(".pantry-loc-row").length;
    const div=document.createElement("div");
    div.className="pantry-loc-row";
    div.dataset.idx=idx;
    div.style.cssText="display:flex;align-items:center;gap:6px;margin-bottom:6px";
    div.innerHTML=`<span style="cursor:grab;color:var(--muted);font-size:.9rem;padding:4px">⠿</span>
      <input type="text" class="text-in pantry-loc-input" style="flex:1;font-size:.8rem" placeholder="New location name"/>
      <button class="pantry-loc-delete" data-idx="${idx}" style="background:none;border:none;color:var(--red);font-size:1rem;cursor:pointer;padding:4px 6px">×</button>`;
    list.appendChild(div);
    div.querySelector("input")?.focus();
    // Bind delete on this new row
    div.querySelector(".pantry-loc-delete")?.addEventListener("click",()=>div.remove());
  });
  // Delete existing location rows
  document.querySelectorAll(".pantry-loc-delete").forEach(b=>b.addEventListener("click",()=>{
    b.closest(".pantry-loc-row")?.remove();
  }));
}

// DATA EXPORT (v5.1)

async function exportData(){
  try{
    // Load all checkin rows
    const r=await fetch(`${SB_URL}/rest/v1/pacing_arc?device_id=eq.${DEVICE_ID()}&date=neq.profile&order=date`,{headers:{...SB_HDR,"Accept":"application/json"}});
    const rows=await r.json();
    const evR=await fetch(`${SB_URL}/rest/v1/pacing_arc_events?device_id=eq.${DEVICE_ID()}&order=date`,{headers:{...SB_HDR,"Accept":"application/json"}});
    const evRows=await evR.json();

    // Build checkins CSV
    const ciHeaders=["date","gate","eu_budget","eu_used","battery","hrv","rhr","sleep","energy","feel","symptoms","phase","env","plans","evening_rating","evening_symptoms"];
    const ciRows=rows.map(row=>{
      const c=row.checkin||{};
      return [
        row.date,row.gate,row.eu_budget,row.eu_used,
        c.battery,c.hrv,c.rhr,c.sleep,c.energy,c.feel,
        (c.symptoms||[]).join("|"),c.phase,(c.env||[]).join("|"),c.plans||"",
        c.evening_rating||"",(c.evening_symptoms||[]).join("|")
      ].map(v=>JSON.stringify(v??"")||"\"\"").join(",");
    });
    const ciCSV=[ciHeaders.join(","),...ciRows].join("\n");

    // Build events CSV
    const evHeaders=["date","title","type","eu_cost","buffer_eu","recovery_days","notes"];
    const evCSVRows=(Array.isArray(evRows)?evRows:[]).map(e=>[e.date,e.title,e.type,e.eu_cost,e.buffer_eu,e.recovery_days,e.notes||""].map(v=>JSON.stringify(v??"")||"\"\"").join(","));
    const evCSV=[evHeaders.join(","),...evCSVRows].join("\n");

    // Download both
    const dl=(filename,content)=>{
      const blob=new Blob([content],{type:"text/csv"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
    };
    dl("pacing-arc-checkins.csv",ciCSV);
    setTimeout(()=>dl("pacing-arc-events.csv",evCSV),500);
  }catch(e){alert("Export failed: "+e.message);}
}

// ── BIND MAIN ─────────────────────────────────────
function bindMain(){
  // v6.0 — periodic cognitive layer check (every 2 min)
  if(!window._cognitiveTickInterval){
    window._cognitiveTickInterval = setInterval(tickCognitiveLayer, 2 * 60 * 1000);
  }

  document.getElementById("main-home")?.addEventListener("click",()=>{S.screen="home";render();});
  // ── v10.0 — Canvas bindings ──────────────────────

  // View toggle
  document.getElementById("canvas-view-day")?.addEventListener("click",()=>{S.canvas_view="day";render();});
  document.getElementById("canvas-view-week")?.addEventListener("click",()=>{S.canvas_view="week";render();});

  // Week layer filter
  document.querySelectorAll(".week-filter-btn").forEach(btn=>btn.addEventListener("click",()=>{
    S.week_layer_filter=btn.dataset.filter;render();
  }));

  // Day nav
  document.getElementById("canvas-prev-day")?.addEventListener("click",()=>{
    S.canvas_date=dateAddDays(S.canvas_date||todayStr(),-1);
    S.canvas_blocks=[];render();
  });
  document.getElementById("canvas-next-day")?.addEventListener("click",()=>{
    S.canvas_date=dateAddDays(S.canvas_date||todayStr(),1);
    S.canvas_blocks=[];render();
  });
  document.getElementById("canvas-goto-today")?.addEventListener("click",()=>{
    S.canvas_date=todayStr();S.canvas_blocks=[];render();
  });

  // Open canvas voluntary check-in
  document.getElementById("canvas-voluntary")?.addEventListener("click",()=>{
    S.show_voluntary=true;S.voluntary_step=0;S.voluntary_data={};render();
  });

  // Colour setup — save
  document.getElementById("btn-canvas-colours-save")?.addEventListener("click",()=>{
    ["rock","pebble","sand","gap","water"].forEach(k=>{
      const el=document.getElementById("col-"+k);
      if(el)S.layer_colours[k]=el.value;
    });
    S.canvas_colour_setup_done=true;S.canvas_colour_setup_open=false;
    saveLayerColours();render();
  });
  document.getElementById("btn-canvas-colours-default")?.addEventListener("click",()=>{
    S.layer_colours={rock:"#a78bfa",pebble:"#34d399",sand:"#fb923c",gap:"#93c5fd",water:"#6ee7b7"};
    S.canvas_colour_setup_done=true;S.canvas_colour_setup_open=false;
    saveLayerColours();render();
  });
  document.getElementById("canvas-edit-colours")?.addEventListener("click",()=>{
    S.canvas_colour_setup_done=false;render();
  });

  // Block done toggle
  document.querySelectorAll(".canvas-block-done").forEach(btn=>btn.addEventListener("click",()=>{
    const id=btn.dataset.id;
    S.canvas_blocks=S.canvas_blocks.map(b=>{
      if(b.id!==id) return b;
      const nowDone=!b.done;
      // Part 5a: feed into activity log
      if(!S.activity_log) S.activity_log=[];
      if(nowDone){
        const now=new Date();
        S.activity_log=[...S.activity_log,{
          id:"al_"+id+"_"+Date.now(),
          block_id:id,
          title:b.title,
          eu_cost:b.eu_cost||0,
          return_eu:b.return_eu||0,
          layer:b.layer,
          time:`${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`,
          ts:Date.now()
        }];
        S.eu_used=Math.max(0,(S.eu_used||0)+(b.eu_cost||0));
        if(b.event_id) EVENTS=EVENTS.map(ev=>String(ev.id)===String(b.event_id)?{...ev,_done_today:true}:ev);
      } else {
        S.activity_log=S.activity_log.filter(a=>a.block_id!==id);
        S.eu_used=Math.max(0,(S.eu_used||0)-(b.eu_cost||0));
        if(b.event_id) EVENTS=EVENTS.map(ev=>String(ev.id)===String(b.event_id)?{...ev,_done_today:false}:ev);
      }
      return {...b,done:nowDone};
    });
    render(); saveCanvasBlocks();
  }));

  // Block remove (except gap)
  // Layer badge: tap to cycle layer on a canvas block (D11)
  document.querySelectorAll(".block-layer-badge").forEach(btn=>btn.addEventListener("click",e=>{
    e.stopPropagation();
    const blockId=btn.dataset.blockId;
    const layerOrder=["rock","pebble","sand","gap","water"];
    const block=S.canvas_blocks&&S.canvas_blocks.find(b=>b.id===blockId);
    if(!block)return;
    const curIdx=layerOrder.indexOf(block.layer);
    const nextLayer=layerOrder[(curIdx+1)%layerOrder.length];
    S.canvas_blocks=S.canvas_blocks.map(b=>b.id===blockId?{...b,layer:nextLayer}:b);
    render(); saveCanvasBlocks();
  }));

  document.querySelectorAll(".canvas-block-remove").forEach(btn=>btn.addEventListener("click",()=>{
    const id=btn.dataset.id;
    const block=S.canvas_blocks.find(b=>b.id===id);
    if(!block)return;
    if(block.layer==="rock"&&!confirm(`Remove "${block.title}" from today? Restorative practices are deleted if missed — not carried forward.`))return;
    S.canvas_blocks=S.canvas_blocks.filter(b=>b.id!==id);
    render(); saveCanvasBlocks();
  }));

  // Pool tier selection
  // Part 7a: pool section toggles (collapsed by default, state persists)
  document.querySelectorAll(".pool-section-toggle").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const sec=btn.dataset.section;
      if(!S.pool_section_open) S.pool_section_open={};
      const container=document.getElementById("canvas-pool-container");
      const scrollTop=container?.scrollTop||0;
      S.pool_section_open[sec]=!S.pool_section_open[sec];
      render();
      // Restore scroll position after render
      requestAnimationFrame(()=>{
        const c2=document.getElementById("canvas-pool-container");
        if(c2) c2.scrollTop=scrollTop;
      });
    });
  });

  document.querySelectorAll(".pool-tier-btn").forEach(btn=>btn.addEventListener("click",e=>{
    e.stopPropagation();
    const poolId=btn.dataset.poolId;
    const tierKey=btn.dataset.tierKey;
    if(!S.pool_tier_sel)S.pool_tier_sel={};
    S.pool_tier_sel[poolId]=(S.pool_tier_sel[poolId]===tierKey)?null:tierKey;
    render();
  }));

  // Pool add to day (v10.3: show variant picker if item has multiple variants)
  document.querySelectorAll(".pool-add").forEach(btn=>btn.addEventListener("click",()=>{
    const poolId=btn.dataset.poolId;
    const canvasDate=S.canvas_date||todayStr();
    const pool=buildUnscheduledPool(canvasDate,S.gate||"green",S.canvas_blocks);
    const item=pool.find(p=>p.id===poolId);
    if(!item)return;
    // If item has variants, show picker sheet
    if(item.variants&&item.variants.length>1){
      S.pool_variant_pick=item;
      render(); return;
    }
    const newBlock={
      id:"placed_"+Date.now(),
      title:item.title, layer:item.layer, eu_cost:item.eu_cost,
      return_eu:item.return_eu||0, return_note:item.return_note||"",
      restorative:item.restorative||false,

    const originDateStr = document.getElementById("ing-origin-date")?.value||"";
    const exType = S.ing_expiry_type||"best_before";
    let expiry_date = null, days_to_expiry = null;
    if(originDateStr){
      const base = new Date(originDateStr);
      if(!isNaN(base)){
        const d = new Date(base);
        if(exType==="best_before"){
          expiry_date = originDateStr;
        } else if(exType==="lay_date"){
          d.setDate(d.getDate()+35); expiry_date=d.toISOString().split("T")[0];
        } else if(exType==="opened_on"){
          d.setDate(d.getDate()+90); expiry_date=d.toISOString().split("T")[0];
        } else if(exType==="cook_date"){
          d.setDate(d.getDate()+3);  expiry_date=d.toISOString().split("T")[0];

function bindEventSheet(){
  if(!S.show_event_sheet)return;
  const ev=S.event_edit||{};

  // Fix 4: save all fields to S.event_sheet_draft on every change to prevent title wipe
  function saveDraft(){
    S.event_sheet_draft={
      title: document.getElementById("ev-title")?.value??S.event_sheet_draft?.title,
      date: document.getElementById("ev-date")?.value??S.event_sheet_draft?.date,
      start_time: document.getElementById("ev-time")?.value??S.event_sheet_draft?.start_time,
      end_time: document.getElementById("ev-end-time")?.value??S.event_sheet_draft?.end_time,
      location: document.getElementById("ev-location")?.value??S.event_sheet_draft?.location,
      eu_cost: document.getElementById("ev-eu")?.value!==undefined?Number(document.getElementById("ev-eu").value):S.event_sheet_draft?.eu_cost,
      buffer_eu: document.getElementById("ev-buffer")?.value!==undefined?Number(document.getElementById("ev-buffer").value):S.event_sheet_draft?.buffer_eu,
      recovery_days: document.getElementById("ev-recovery")?.value!==undefined?Number(document.getElementById("ev-recovery").value):S.event_sheet_draft?.recovery_days,
      notes: document.getElementById("ev-notes")?.value??S.event_sheet_draft?.notes,
      spread_days: document.getElementById("ev-spread")?.value?Number(document.getElementById("ev-spread").value):S.event_sheet_draft?.spread_days,
      type: S.event_edit?.type||S.event_sheet_draft?.type,
    };
  }
  ["ev-title","ev-date","ev-time","ev-end-time","ev-location","ev-eu","ev-buffer","ev-recovery","ev-notes","ev-spread"].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener("input",saveDraft);
    if(el) el.addEventListener("change",()=>{saveDraft();if(id==="ev-date"||id==="ev-eu")render();});
  });

  // Type tags
  document.querySelectorAll("#ev-type-tags .tag").forEach(b=>b.addEventListener("click",()=>{
    if(!S.event_edit)S.event_edit={};
    S.event_edit.type=b.dataset.type;render();
  }));
  // EU presets
  document.querySelectorAll(".ev-eu-preset").forEach(b=>b.addEventListener("click",()=>{
    const inp=document.getElementById("ev-eu");if(inp){inp.value=b.dataset.val;
      if(!S.event_edit)S.event_edit={};
      S.event_edit.eu_cost=Number(b.dataset.val);render();}
  }));
  // EU input live update for tier display
  document.getElementById("ev-eu")?.addEventListener("input",e=>{
    if(!S.event_edit)S.event_edit={};
    S.event_edit.eu_cost=Number(e.target.value);render();
  });
  // Date change (for phase warning)
  document.getElementById("ev-date")?.addEventListener("change",e=>{
    if(!S.event_edit)S.event_edit={};
    S.event_edit.date=e.target.value;render();
  });
  // Part 8a: AI EU estimation
  document.getElementById("ev-ai-estimate")?.addEventListener("click",async()=>{
    if(!aiEnabled()) return;
    const title=document.getElementById("ev-title")?.value?.trim();
    const type=(S.event_edit?.type||S.event_sheet_draft?.type||"");
    const startT=document.getElementById("ev-time")?.value;
    const endT=document.getElementById("ev-end-time")?.value;
    let durationNote="";
    if(startT&&endT){
      const [sh,sm]=startT.split(":").map(Number);
      const [eh,em]=endT.split(":").map(Number);
      const mins=(eh*60+em)-(sh*60+sm);
      if(mins>0) durationNote=`Duration: ${mins} minutes.`;
    }
    const btn=document.getElementById("ev-ai-estimate");
    if(btn) btn.textContent="⏳ Estimating…";
    try{
      const EU_TABLE=`EU reference: Medical local 5·Travel 12·Social 4·Work 6·Phone call 2·Light computer work 2·Appointment (local) 5·Appointment (travel) 8`;
      const prompt=`Estimate the energy cost (EU) for the following event for a person with ME/CFS. Traffic light: ${gateLabel(S.gate||"green")}.
Event: "${title||"(no title)"}", Type: ${type||"unspecified"}. ${durationNote}
${EU_TABLE}
Return ONLY a JSON object with keys: eu_cost (number), buffer_eu (number, typically 2-4), recovery_days (number, 0-3). No other text.`;
      const raw=await callCompanionAPI([{role:"user",content:prompt}],"You are an EU cost estimator for ME/CFS pacing. Return only JSON.");
      const clean=raw.replace(/```json|```/g,"").trim();
      const est=JSON.parse(clean);
      if(est.eu_cost){
        const euIn=document.getElementById("ev-eu");
        const bufIn=document.getElementById("ev-buffer");
        const recIn=document.getElementById("ev-recovery");
        if(euIn) euIn.value=est.eu_cost;
        if(bufIn) bufIn.value=est.buffer_eu||2;
        if(recIn) recIn.value=est.recovery_days||1;
        if(!S.event_edit) S.event_edit={};
        S.event_edit.eu_cost=est.eu_cost;
        saveDraft(); render();
      }
    }catch(e){
      showToast("Estimate failed — use presets","red");
    }
    if(btn) btn.textContent="🤖 Estimate EU from title + type";
  });
  document.getElementById("save-event")?.addEventListener("click",async()=>{
    const title=document.getElementById("ev-title")?.value?.trim();
    const date=document.getElementById("ev-date")?.value;
    const eu=Number(document.getElementById("ev-eu")?.value)||0;
    const buffer=Number(document.getElementById("ev-buffer")?.value)||getEventTier(eu).buffer;
    const recovery=Number(document.getElementById("ev-recovery")?.value)||getEventTier(eu).recovery;
    const notes=document.getElementById("ev-notes")?.value||"";
    const start_time=document.getElementById("ev-time")?.value||null;
    const spread_days=Math.max(1,Number(document.getElementById("ev-spread")?.value)||1);
    const type=S.event_edit?.type||"medical";
    if(!title||!date){alert("Title and date are required.");return;}
    // v9.0: start_time now saved to Supabase (requires ALTER TABLE pacing_arc_events ADD COLUMN start_time text)
    const end_time = document.getElementById("ev-end-time")?.value||null;
    const location = document.getElementById("ev-location")?.value?.trim()||null;
    const data={device_id:DEVICE_ID(),date,title,type,eu_cost:eu,buffer_eu:buffer,recovery_days:recovery,notes,start_time:start_time||null,end_time:end_time||null,location:location||null,spread_days:spread_days>1?spread_days:null};
    const localData={...data,start_time,end_time,location,spread_days};
    try{
      if(S.event_edit?.id){
        await sbUpdate("pacing_arc_events",S.event_edit.id,data);
        EVENTS=EVENTS.map(e=>String(e.id)===String(S.event_edit.id)?{...e,...localData}:e);
      }else{
        const saved=await sbInsert("pacing_arc_events",data);
        if(saved&&saved.id)EVENTS.push({...saved,...localData});
        else EVENTS.push({...localData,id:"tmp_"+Date.now()});
      }
    }catch(err){
      EVENTS.push({...localData,id:"tmp_"+Date.now()});
      showToast("Save failed — event stored locally only: "+err.message);
    }
    S.show_event_sheet=false;S.event_edit=null;S.event_sheet_draft=null;render();
  });
}

function startCrashWalkTimer(){
  if(crashWalkTimer)clearInterval(crashWalkTimer);
  const step=CRASH_WALK_STEPS[S.crash_walk_step];
  if(!step||!step.timer)return;
  crashWalkTimerVal=step.timer;
  crashWalkTimer=setInterval(()=>{
    crashWalkTimerVal=Math.max(0,crashWalkTimerVal-1);
    const el=document.getElementById("crash-walk-timer");
    if(el)el.textContent=fmtTimer(crashWalkTimerVal);
    if(crashWalkTimerVal<=0){clearCrashWalkTimer();}
  },1000);
}
function clearCrashWalkTimer(){if(crashWalkTimer){clearInterval(crashWalkTimer);crashWalkTimer=null;}}

// BIND EVENING SHEET (v5.1)
// ═══════════════════════════════════════════════════
function bindEveningSheet(){
  if(!S.show_evening)return;
  const step=S.evening_step||0;
  // Must match renderEveningSheet steps exactly (6 steps incl. cognitive_feel)
  const steps=[
    {id:"rating",type:"choice"},{id:"eu_accuracy",type:"choice"},
    {id:"symptoms",type:"multi"},{id:"feel_vs_morning",type:"choice"},
    {id:"cognitive_feel",type:"choice"},{id:"notes_tomorrow",type:"text"}
  ];
  const totalSteps=steps.length;
  const s=steps[step];
  document.querySelectorAll(".ev-choice").forEach(b=>b.addEventListener("click",()=>{
    S.evening_data[s.id]=b.dataset.v;render();
  }));
  document.querySelectorAll(".ev-tag").forEach(b=>b.addEventListener("click",()=>{
    const v=b.dataset.v;let cur=S.evening_data[s.id]||[];
    if(v==="None"){cur=["None"];}else{cur=cur.filter(x=>x!=="None");cur=cur.includes(v)?cur.filter(x=>x!==v):[...cur,v];}
    S.evening_data[s.id]=cur;render();
  }));
  document.getElementById("ev-notes-in")?.addEventListener("input",e=>{S.evening_data[s.id]=e.target.value;});
  document.getElementById("evening-next")?.addEventListener("click",async()=>{
    if(step<totalSteps-1){S.evening_step=step+1;render();return;}
    // Save evening data — do NOT recalculate gate/EU (morning values are authoritative)
    S.ci.evening_rating=S.evening_data.rating;
    S.ci.evening_symptoms=S.evening_data.symptoms||[];
    S.ci.evening_eu_accuracy=S.evening_data.eu_accuracy;
    S.ci.evening_feel=S.evening_data.feel_vs_morning;
    S.ci.cognitive_feel=S.evening_data.cognitive_feel||"";
    S.ci.cognitive_wall_hit=S.evening_data.cognitive_feel==="Hit a wall early";
    S.ci.notes_tomorrow=S.evening_data.notes_tomorrow||"";
    S.evening_done=true;S.show_evening=false;
    // v9.0 — show evening close-out loop
    S.closeout_data=generateCloseout();
    S.screen="closeout";
    render();syncToday();
  });
}

// BIND VOLUNTARY SHEET (v6.8)
// ═══════════════════════════════════════════════════
function bindVoluntarySheet(){
  if(!S.show_voluntary)return;
  const step=S.voluntary_step||0;
  document.getElementById("close-voluntary-sheet")?.addEventListener("click",()=>{S.show_voluntary=false;render();});
  document.getElementById("voluntary-sheet-overlay")?.addEventListener("click",e=>{if(e.target.id==="voluntary-sheet-overlay"){S.show_voluntary=false;render();}});
  document.getElementById("vcl-sl")?.addEventListener("input",e=>{
    const v=Number(e.target.value);
    const id=step===0?"energy":"battery";
    S.voluntary_data[id]=v;
    const steps=[
      {lbl:v=>v<3?"Very low":v<5?"Low":v<7?"Moderate":"Good",col:v=>v<3?"#f87171":v<5?"#fb923c":v<7?"#fbbf24":"#34d399"},
      {lbl:v=>v<25?"Depleted":v<50?"Low":v<75?"Moderate":"Good",col:v=>v<25?"#f87171":v<50?"#fb923c":v<75?"#fbbf24":"#34d399"},
    ];
    const s=steps[step]||steps[0];
    const c=s.col(v),l=s.lbl(v);
    const lbl=document.querySelector(".sl-val"),fill=document.getElementById("vcl-sl-fill");
    if(lbl){lbl.textContent=`${v} — ${l}`;lbl.style.color=c;}
    if(fill){fill.style.width=`${((v-(step===0?0:0))/(step===0?10:100))*100}%`;fill.style.background=c;}
    document.getElementById("voluntary-next").disabled=false;
  });
  document.querySelectorAll(".vcl-tag").forEach(b=>b.addEventListener("click",()=>{
    const v=b.dataset.v;let cur=S.voluntary_data.symptoms||[];
    if(v==="None"){cur=["None"];}else{cur=cur.filter(x=>x!=="None");cur=cur.includes(v)?cur.filter(x=>x!==v):[...cur,v];}
    S.voluntary_data.symptoms=cur;render();
  }));
  document.getElementById("voluntary-next")?.addEventListener("click",()=>{
    const totalSteps=3;
    if(step<totalSteps-1){S.voluntary_step=step+1;render();return;}
    // Apply: merge voluntary data into ci and recalculate gate/EU
    const prevBudget=S.eu_budget;
    const prevUsed=S.eu_used;
    const newEnergy=S.voluntary_data.energy??S.ci?.energy??5;
    const newBattery=S.voluntary_data.battery??S.ci?.battery??50;
    const newSyms=S.voluntary_data.symptoms||[];
    // Merge new readings into ci — keep all other fields (HRV, sleep, phase etc.)
    const updatedCi={...(S.ci||{}),energy:newEnergy,battery:newBattery,
      symptoms:[...new Set([...((S.ci||{}).symptoms||[]).filter(x=>x!=="None"),...newSyms.filter(x=>x!=="None")])]};
    if(newSyms.includes("None"))updatedCi.symptoms=["None"];
    S.ci=updatedCi;
    const bankingMod=getBankingModForDate(todayStr());
    const newGate=gateColour(updatedCi);
    const newBudgetRaw=euBudget(updatedCi,bankingMod);
    // Apply same memory adjustments as morning
    let newBudget=newBudgetRaw;
    if(S.memory_adjustment&&S.memory_adjustment.pct>0)newBudget=Math.max(5,Math.round(newBudget*(1-S.memory_adjustment.pct/100)));
    else if(S.memory_adjustment&&S.memory_adjustment.pct<0)newBudget=Math.round(newBudget*(1+Math.abs(S.memory_adjustment.pct)/100));
    S.gate=newGate;
    // Preserve used EU — only adjust remaining, don't inflate total if budget increased
    if(newBudget>prevBudget){const diff=newBudget-prevBudget;S.eu_budget=prevBudget+diff;}
    else{S.eu_budget=Math.max(prevUsed,newBudget);}
    S.show_voluntary=false;
    render();syncToday();
    showToast(`Gate updated: ${newGate} · ${S.eu_budget-S.eu_used} EU remaining`);
  });
}

function bindPanicSheet(){
  if(!S.show_panic)return;
  document.querySelectorAll(".panic-what").forEach(b=>b.addEventListener("click",()=>{S.panic_data.what=b.dataset.v;render();}));
  document.querySelectorAll(".panic-sev").forEach(b=>b.addEventListener("click",()=>{S.panic_data.severity=b.dataset.v;render();}));
  document.getElementById("panic-next")?.addEventListener("click",()=>{S.panic_step=1;render();});
  document.getElementById("panic-confirm")?.addEventListener("click",()=>{
    const sev=S.panic_data.severity;
    S.show_panic=false;
    // Log panic event
    S.ci.panic_event={time:new Date().toISOString(),what:S.panic_data.what,severity:sev};
    if(sev==="mild"){
      // Just start rest timer
      startRestTimer();
      S.tab="tasks";
    } else if(sev==="moderate"){
      S.eu_budget=S.eu_used; // No more EU for today
      S.tab="plan";
    } else if(sev==="severe"){
      S.eu_budget=S.eu_used;
      S.in_crash=true;S.crash_day=1;
      S.tab="crash";
    }
    render();syncToday();
  });
}

function bindMiddaySheet(){
  if(!S.show_midday)return;
  const steps=[
    {q:"Energy right now?",type:"slider",id:"energy",min:0,max:10,def:5,
      lbl:v=>v<3?"Very low":v<5?"Low":v<7?"Moderate":"Good",col:v=>v<3?"#f87171":v<5?"#fb923c":v<7?"#fbbf24":"#34d399"},
    {q:"Any new symptoms?",type:"multi",id:"symptoms",opts:["Brain fog","Muscle pain","Sore throat/flu feeling","Wired-tired","Sensory sensitivity","None"]},
    {q:"Compared to this morning?",type:"choice",id:"feel",opts:["Worse","Same","Better"],cols:["#f87171","#fbbf24","#34d399"]}
  ];
  const s=steps[S.midday_step||0];
  if(!S.midday_data)S.midday_data={};

  document.getElementById("close-midday-sheet")?.addEventListener("click",()=>{S.show_midday=false;render();});
  document.getElementById("midday-sheet-overlay")?.addEventListener("click",e=>{if(e.target.id==="midday-sheet-overlay"){S.show_midday=false;render();}});
  document.getElementById("md-sl")?.addEventListener("input",e=>{
    const v=Number(e.target.value);S.midday_data[s.id]=v;
    const c=s.col(v),l=s.lbl(v);
    const lbl=document.querySelector(".sl-val"),fill=document.getElementById("md-sl-fill");
    if(lbl){lbl.textContent=`${v} — ${l}`;lbl.style.color=c;}
    if(fill){fill.style.width=`${((v-s.min)/(s.max-s.min))*100}%`;fill.style.background=c;}
    document.getElementById("midday-next").disabled=false;
  });
  document.querySelectorAll(".md-choice").forEach(b=>b.addEventListener("click",()=>{S.midday_data[s.id]=b.dataset.v;render();}));
  document.querySelectorAll(".md-tag").forEach(b=>b.addEventListener("click",()=>{
    const v=b.dataset.v;let cur=S.midday_data[s.id]||[];
    if(v==="None"){cur=["None"];}else{cur=cur.filter(x=>x!=="None");cur=cur.includes(v)?cur.filter(x=>x!==v):[...cur,v];}
    S.midday_data[s.id]=cur;render();
  }));
  document.getElementById("midday-next")?.addEventListener("click",()=>{
    const step=S.midday_step||0;
    if(step<2){S.midday_step=step+1;render();return;}
    // Apply mid-day adjustment
    const morningEnergy=S.ci.energy??5;
    const midEnergy=S.midday_data.energy??5;
    const newSyms=S.midday_data.symptoms||[];
    const pem=["Muscle pain","Sore throat/flu feeling","Wired-tired","Sensory sensitivity"];
    const newPemCount=newSyms.filter(x=>pem.includes(x)).length;
    if((morningEnergy-midEnergy)>=3||newPemCount>=2){
      S.eu_budget=Math.max(5,Math.round(S.eu_budget*.7));
      const newGate=gateColour({...S.ci,energy:midEnergy,symptoms:[...(S.ci.symptoms||[]),...newSyms]});
      if(newGate==="red"&&S.gate!=="red")S.gate=newGate;
      S.plan=generatePlan({...S.ci,energy:midEnergy});
      if(S.plan)S.plan.midday_updated=true;
    }
    S.midday_done=true;S.show_midday=false;S.ci.midday=S.midday_data;
    render();syncToday();
  });
}
