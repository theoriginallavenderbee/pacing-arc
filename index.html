// Fuzzy match for variant search — returns score 0–1
function fuzzyIngredientMatch(query, name){
  if(!query||!name)return 0;
  const q=query.toLowerCase().trim();
  const n=name.toLowerCase().trim();
  if(n===q)return 1;
  if(n.includes(q)||q.includes(n))return 0.85;
  // word overlap
  const qw=q.split(/\s+/);
  const nw=n.split(/\s+/);
  const shared=qw.filter(w=>nw.some(nww=>nww.includes(w)||w.includes(nww))).length;
  if(shared>0)return shared/Math.max(qw.length,nw.length)*0.7;
  return 0;
}
// Return inventory items that fuzzy-match query
function searchInventory(query){
  if(!query||query.trim().length<2)return[];
  return INGREDIENT_INVENTORY
    .map(i=>({item:i,score:fuzzyIngredientMatch(query,i.name)}))
    .filter(x=>x.score>0.3)
    .sort((a,b)=>b.score-a.score)
    .slice(0,5)
    .map(x=>x.item);
}

// Helpers
function lookupFructan(name){
  if(!name)return null;
  const n=name.toLowerCase();
  for(const[k,v]of Object.entries(FRUCTAN_TABLE)){if(n.includes(k))return v;}
  return null;
}
function lookupLactose(name){
  if(!name)return null;
  const n=name.toLowerCase();
  for(const[k,v]of Object.entries(LACTOSE_TABLE)){if(n.includes(k))return v;}
  return null;
}
function lookupOmega(name){
  if(!name)return null;
  const n=name.toLowerCase();
  for(const[k,v]of Object.entries(OMEGA_TABLE)){if(n.includes(k))return v;}
  return null;
}
function inferCategory(name){
  if(!name)return"other";
  const n=name.toLowerCase();
  for(const[cat,kws]of Object.entries(CATEGORY_KEYWORDS)){
    if(kws.some(k=>n.includes(k)))return cat;
  }
  return"other";
}
function autoPopulateNutrition(ing){
  if(!ing.name)return ing;
  const fr=lookupFructan(ing.name);
  const la=lookupLactose(ing.name);
  const om=lookupOmega(ing.name);
  return{
    ...ing,
    high_fructan:   ing.high_fructan!==undefined ? ing.high_fructan : (fr?fr.status==="high":false),
    fructan_status: fr?.status||"unknown",
    fructan_note:   fr?.note||"Check FODMAP app manually",
    lactose:        ing.lactose!==undefined ? ing.lactose : (la?la.lactose:false),
    lactose_note:   la?.note||"",
    omega3:         ing.omega3||(om?.omega3||"low"),
    omega6:         ing.omega6||(om?.omega6||"low"),
    omega_note:     om?.note||"",
    category:       (ing.category&&ing.category!=="other") ? ing.category : inferCategory(ing.name),
  };
}

// v9.3 — MICRO-ADJUSTMENT ENGINE
// Returns highest-priority contextual nudge object or null
// ═══════════════════════════════════════════════════
function getMicroAdjustmentNudge(){
  const gate = S.gate||"green";
  const now  = new Date();
  const h    = now.getHours();
  const nowMins = h*60 + now.getMinutes();
  const bb   = S.ci?.battery ?? 50;
  const temp = S.weather?.temperature_2m_max ?? 0;
  const dismissed = S.micro_adj_dismissed||{};
  const ortho = (S.ci?.symptoms||[]).some(s=>/dizz|orthostatic/i.test(s));
  const log = S.activity_log||[];

  // Parse a logged time string "HH:MM" to minutes since midnight
  const toMins = t => { if(!t)return-999; const[a,b]=t.split(":").map(Number); return a*60+b; };

  const waterLogged = log.some(e=>/water|hydrat/i.test(e.task));
  const hasEaten    = S.ci?.eaten_yet==="Yes";
  const mealLogs    = log.filter(e=>/meal|eat|food|lunch|dinner|breakfast|snack/i.test(e.task));
  const lastMealMins = mealLogs.length ? nowMins - toMins(mealLogs[mealLogs.length-1].time) : 999;
  const taskLogs    = log.filter(e=>(e.cost||0)>0);
  const lastTaskMins = taskLogs.length ? nowMins - toMins(taskLogs[taskLogs.length-1].time) : 999;

  // Upcoming event within 2 hours
  const upcomingEvent = (EVENTS||[]).find(ev=>{
    if(ev.date!==todayStr()||!ev.start_time)return false;
    const[eh,em]=ev.start_time.split(":").map(Number);
    const diff=(eh*60+em)-nowMins;
    return diff>0&&diff<=120;
  });

  const ok = k => !dismissed[todayStr()+"_"+k]; // not dismissed today
  const yr = gate==="yellow"||gate==="red";
  const r  = gate==="red";

  // Priority-ordered list — first match wins
  const checks = [
    // Pre-event radical rest (Yellow/Red, event ≤2h away)
    { k:"pre_event_rest", show: yr && !!upcomingEvent && ok("pre_event_rest"),
      icon:"🛋", text:`Rest before ${upcomingEvent?.title||"your next event"} — lie down now while you still have time.` },

    // Morning hydration (all gates, before noon, water not yet logged)
    { k:"morning_hydration", show: !waterLogged && h<12 && ok("morning_hydration"),
      icon:"💧", text: yr
        ? "Have you had water yet? Electrolytes help more than plain water on hard days — miso broth, a pinch of salt, or an electrolyte sachet."
        : "Have you had water yet this morning?" },

    // Paced breathing (Yellow/Red, morning)
    { k:"paced_breathing", show: yr && h<11 && ok("paced_breathing"),
      icon:"🌬", text:"A 2-minute breathing practice before anything else — 4 counts in, 6–8 out. Helps offset overnight stress carry-over." },

    // Compression garments (Yellow/Red, morning, OI symptoms present)
    { k:"compression", show: yr && h<11 && ortho && ok("compression"),
      icon:"🧦", text:"Compression socks on before your first upright activity — standard OI management." },

    // Eating before hunger (Yellow/Red: 3h, Green: 4h)
    { k:"eat_soon", show: ok("eat_soon") && (
        (yr  && (lastMealMins>=180 || (!hasEaten && h>9))) ||
        (!yr && lastMealMins>=240) ),
      icon:"🍽", text: r
        ? "Time to eat — no-prep is fine. Eating before hunger avoids an activation spike your nervous system doesn't need right now."
        : "Might be time to eat — food before hunger keeps things calmer." },

    // Lie down after task (Yellow/Red, task logged recently)
    { k:"lie_down", show: yr && taskLogs.length>0 && lastTaskMins<=10 && ok("lie_down"),
      icon:"🛋", text: r
        ? "A 15–20 minute lie-down before your next task — flat is better than semi-reclined for OI. It restores blood flow."
        : "Worth a 10-minute horizontal rest after that." },

    // Posture (Yellow/Red, OI symptoms)
    { k:"posture", show: yr && ortho && ok("posture"),
      icon:"🪑", text:"Can this be done seated or lying? Every minute upright when you don't need to be adds haemodynamic strain." },

    // Cool cloth (Yellow/Red)
    { k:"cool_cloth", show: yr && ok("cool_cloth"),
      icon:"🧊", text:"A cool cloth on your forehead or cheeks activates your parasympathetic nervous system — immediate calming effect. Apply, then lie down." },

    // Temperature (warm day + Yellow/Red)
    { k:"temperature", show: yr && temp>24 && ok("temperature"),
      icon:"🌡", text:"It is warm today — is your rest space cool? A fan is better than cold aircon. Cool the room before lying down." },

    // Sensory load (Yellow/Red, afternoon)
    { k:"sensory_load", show: yr && h>=14 && ok("sensory_load"),
      icon:"🔇", text:"Before you rest: lights dimmed? Noise reduced? Screen off? Full rest in ME/CFS needs minimal sensory input." },

    // Mid-afternoon electrolytes (Yellow/Red, 2–4pm)
    { k:"afternoon_elec", show: yr && h>=14 && h<=16 && ok("afternoon_elec"),
      icon:"⚡", text:"Mid-afternoon electrolyte top-up — OI symptoms accumulate as the day goes on. Miso broth, electrolyte sachet, or salted water." },

    // No-prep food on Red (every ~2.5h)
    { k:"noprepfood", show: r && lastMealMins>=150 && ok("noprepfood"),
      icon:"🥜", text:"Time for no-prep food — peanut butter, rice crackers, anything reachable from where you are. You don't need to stand up." },
  ];

  for(const chk of checks){
    if(chk.show) return {key:chk.k, icon:chk.icon, text:chk.text};
  }
  return null;
}

// Which tier to default to based on gate
function defaultTierKey(gate){ return gate==="red"?"minimal":gate==="yellow"?"reduced":"full"; }

// Get the tier object to display by default for a task + gate, falling back toward full if tier missing
function getDefaultTier(taskName, gate){
  const t = TASK_TIERS_DEFAULT[taskName];
  if(!t) return null;  // no tiers defined — use TASK_COSTS_BASE
  const preferred = defaultTierKey(gate);
  if(preferred==="minimal" && t.minimal) return {key:"minimal", ...t.minimal};
  if((preferred==="minimal"||preferred==="reduced") && t.reduced) return {key:"reduced", ...t.reduced};
  return {key:"full", ...t.full};
}

// Get all defined tiers for a task as array [{key, label, eu}]
function getAllTiers(taskName){
  const t = TASK_TIERS_DEFAULT[taskName];
  if(!t) return [];
  const out = [];
  if(t.full)    out.push({key:"full",    ...t.full});
  if(t.reduced) out.push({key:"reduced", ...t.reduced});
  if(t.minimal) out.push({key:"minimal", ...t.minimal});
  return out;
}

// Effective EU cost for a task on current gate (used in plan generation)
function tierEuForGate(taskName, gate){
  const tier = getDefaultTier(taskName, gate);
  if(tier) return tier.eu;
  const costs = getTaskCosts();
  return costs[taskName] ?? 0;
}

function getDeviceId(){
  let id=localStorage.getItem("pac_device_id");

  if(!id){id=KNOWN_DEVICE_ID;localStorage.setItem("pac_device_id",id);}

function localDateStr(d){const dt=d||new Date();const y=dt.getFullYear();const m=String(dt.getMonth()+1).padStart(2,"0");const day=String(dt.getDate()).padStart(2,"0");return `${y}-${m}-${day}`;}
function todayStr(){return localDateStr();}
function dateAddDays(dateStr,n){const d=new Date(dateStr+"T12:00:00");d.setDate(d.getDate()+n);return localDateStr(d);}
function daysBetween(a,b){return Math.round((new Date(b+"T12:00:00")-new Date(a+"T12:00:00"))/(1000*60*60*24));}
function dayOfWeekShort(dateStr){return new Date(dateStr+"T12:00:00").toLocaleDateString('en-NZ',{weekday:'short'});}
function dayOfMonthShort(dateStr){const d=new Date(dateStr+"T12:00:00");return d.getDate()+' '+d.toLocaleDateString('en-NZ',{month:'short'});}

async function sbGet(table,match){
  const params=Object.entries(match).map(([k,v])=>`${k}=eq.${v}`).join("&");
  // order by updated_at desc so newest row wins if duplicates exist
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}&order=updated_at.desc&limit=1`,{headers:{...SB_HDR,"Accept":"application/json"}});
  if(!r.ok)return null;
  const d=await r.json();
  return Array.isArray(d)?d[0]||null:null;
}
async function sbQuery(table,match,order="created_at"){
  // PostgREST takes literal values after eq. — do not encode them
  const params=Object.entries(match).map(([k,v])=>`${k}=eq.${v}`).join("&");
  const url=`${SB_URL}/rest/v1/${table}?${params}&order=${order}`;
  const r=await fetch(url,{headers:{...SB_HDR,"Accept":"application/json"}});
  if(!r.ok){
    const err=await r.text().catch(()=>"");
    console.warn(`sbQuery ${table} HTTP ${r.status}:`,err);
    return [];
  }
  const d=await r.json();
  return Array.isArray(d)?d:[];
}
async function sbUpsert(table,data,conflictCols="device_id,date"){
  // PostgREST upsert requires on_conflict param to know which columns to merge on
  const r=await fetch(`${SB_URL}/rest/v1/${table}?on_conflict=${conflictCols}`,{
    method:"POST",
    headers:{...SB_HDR,"Prefer":"resolution=merge-duplicates,return=representation"},
    body:JSON.stringify(data)
  });
  if(!r.ok){const err=await r.text().catch(()=>"");throw new Error(`sbUpsert ${table} HTTP ${r.status}: ${err}`);}
  return r;
}
async function sbInsert(table,data){
  const r=await fetch(`${SB_URL}/rest/v1/${table}`,{
    method:"POST",
    headers:{...SB_HDR,"Prefer":"return=representation"},
    body:JSON.stringify(data)
  });
  if(!r.ok){const err=await r.text().catch(()=>"");throw new Error(`sbInsert HTTP ${r.status}: ${err.slice(0,200)}`);}
  const d=await r.json();
  return Array.isArray(d)?d[0]:d;
}
async function sbDelete(table,id){

}
async function sbUpdate(table,id,data){

    body:JSON.stringify(data)
  });

  return r;
}

async function sbGetProfile(){return sbGet("pacing_arc",{device_id:DEVICE_ID(),date:"profile"});}
async function sbSaveProfile(p){
  // Always write to localStorage immediately — survives network failures
  localStorage.setItem("pac_profile",JSON.stringify(p));
  // Explicit GET → PATCH if exists, POST if not
  // This bypasses any unique-constraint ambiguity in upsert
  const existing=await sbGet("pacing_arc",{device_id:DEVICE_ID(),date:"profile"});
  if(existing&&existing.id){
    // Row exists — PATCH it by id
    const r=await fetch(`${SB_URL}/rest/v1/pacing_arc?id=eq.${existing.id}`,{
      method:"PATCH",
      headers:{...SB_HDR,"Prefer":"return=representation"},
      body:JSON.stringify({checkin:p,updated_at:new Date().toISOString()})
    });
    if(!r.ok){const err=await r.text().catch(()=>"");throw new Error(`sbSaveProfile PATCH HTTP ${r.status}: ${err}`);}
  } else {
    // No row yet — INSERT
    const r=await fetch(`${SB_URL}/rest/v1/pacing_arc`,{
      method:"POST",
      headers:{...SB_HDR,"Prefer":"return=representation"},
      body:JSON.stringify({device_id:DEVICE_ID(),date:"profile",checkin:p,updated_at:new Date().toISOString()})
    });
    if(!r.ok){const err=await r.text().catch(()=>"");throw new Error(`sbSaveProfile INSERT HTTP ${r.status}: ${err}`);}
  }
}

async function init(){
  S.screen="loading"; render();
  // API key is entered by user in Settings → AI companion and stored in localStorage only.
  // v9.3: load persisted go-to meals
  try{S.goto_meals=JSON.parse(localStorage.getItem("pac_goto_meals")||"[]");}catch(e){S.goto_meals=[];}
  // v10.0: load canvas layer colours
  loadLayerColours();
  // v10.0: canvas localStorage fallback (for when Supabase not yet loaded)
  if(!S.canvas_blocks||S.canvas_blocks.length===0){
    try{
      const saved=JSON.parse(localStorage.getItem("pac_canvas_"+todayStr())||"null");
      if(saved&&Array.isArray(saved.blocks)&&saved.blocks.length){
        S.canvas_blocks=saved.blocks;
        if(saved.date)S.canvas_date=saved.date;
      }
    }catch(_){}
  }
  // Fetch weather (non-blocking)
  fetchWeather().catch(()=>{});
  try{
    const row=await sbGetProfile();
    if(row&&row.checkin){
      // Merge: Supabase row is source of truth, but if localStorage has fields
      // that Supabase row is missing (e.g. bb_high saved before a previous upsert bug),
      // preserve those rather than losing them. Then write the merged result back to Supabase.
      const sbProfile = row.checkin;
      let localProfile = null;
      try{ localProfile = JSON.parse(localStorage.getItem("pac_profile")||"null"); }catch{}
      if(localProfile){
        // Fields present in localStorage but absent/default in Supabase row take precedence
        // This recovers bb_high, bb_low, sleep params that were saved via Settings
        // but never successfully written to Supabase (due to the now-fixed upsert bug)
        PROFILE = Object.assign({}, sbProfile, Object.fromEntries(
          Object.entries(localProfile).filter(([k,v])=>
            v !== null && v !== undefined && v !== "" &&
            (sbProfile[k] === undefined || sbProfile[k] === null || sbProfile[k] === "")
          )
        ));
        // If the merge produced a richer profile than Supabase has, write it back now
        if(JSON.stringify(PROFILE) !== JSON.stringify(sbProfile)){
          sbSaveProfile(PROFILE).catch(()=>{});
        }
      } else {
        PROFILE = sbProfile;
      }
      // Keep localStorage in sync so offline fallback is always current
      localStorage.setItem("pac_profile",JSON.stringify(PROFILE));
      const today=await sbGetToday();
      if(today){
        S.eu_used=today.eu_used||0;
        S.plan=today.plan?(typeof today.plan==="string"?JSON.parse(today.plan):today.plan):null;
        if(today.checkin)S.ci=today.checkin;
        if(today.midday_done)S.midday_done=true;
        if(today.in_crash!==undefined)S.in_crash=today.in_crash;
        if(today.evening_done)S.evening_done=true;
        // v10.0: restore canvas blocks from Supabase (cross-device sync)
        if(today.canvas_blocks&&Array.isArray(today.canvas_blocks)&&today.canvas_blocks.length){
          S.canvas_blocks=today.canvas_blocks;
        }
        if(today.canvas_date)S.canvas_date=today.canvas_date;
        if(today.supplement_log&&typeof today.supplement_log==="object") S.supplement_log=today.supplement_log; // v10.4
        // Restore crash persistence from carry-forward
        if(!S.in_crash&&today.in_crash)S.in_crash=today.in_crash;
        // Always recalculate gate and EU from the stored check-in using the
        // now-loaded PROFILE (correct bb_high etc.), so stale saved values
        // from a previous deploy with wrong defaults never persist at runtime.
        if(S.ci&&S.ci.battery!==undefined){
          const bankingMod=getBankingModForDate(todayStr());
          S.gate=gateColour(S.ci);
          S.eu_budget=euBudget(S.ci,bankingMod);
          if(S.memory_adjustment&&S.memory_adjustment.pct>0){
            S.eu_budget=Math.max(5,Math.round(S.eu_budget*(1-S.memory_adjustment.pct/100)));
          } else if(S.memory_adjustment&&S.memory_adjustment.pct<0){
            S.eu_budget=Math.round(S.eu_budget*(1+Math.abs(S.memory_adjustment.pct)/100));
          }
        } else {
          S.gate=today.gate||"green";
          S.eu_budget=today.eu_budget||12;
        }
      }
      // Load recent days for memory
      await loadRecentDays();
      // Apply carry-forward if no plan yet today
      if(!S.plan){
        S.memory_adjustment=calcMemoryAdjustment();
      }
      // Load events and templates
      await loadEventsAndTemplates();
      // Load maintenance log
      await loadMaintenanceLog();
      await loadMealData();
      // v10.4 Part 9b: load companion state
      try{
        const companionRow=await sbGet("pacing_arc",{device_id:DEVICE_ID(),date:"companion"});
        if(companionRow?.companion_state){
          S.ai_friction_log=companionRow.companion_state.friction_log||[];
          S.ai_messages=companionRow.companion_state.messages||[];
        }
      }catch{}
      SYNC_STATUS="ok"; SYNC_LAST_AT=new Date();
      S.screen="home";
    } else {
      // Supabase returned no profile row — check localStorage before showing setup
      // This covers: first load after a fresh deploy, or Supabase row not yet created
      const localProfile=JSON.parse(localStorage.getItem("pac_profile")||"null");
      if(localProfile){
        PROFILE=localProfile;
        // Re-save to Supabase now that we have a working connection
        sbSaveProfile(PROFILE).catch(()=>{});
        await loadRecentDays();
        if(!S.plan) S.memory_adjustment=calcMemoryAdjustment();
        await loadEventsAndTemplates();
        await loadMaintenanceLog();
        await loadMealData();
        SYNC_STATUS="ok"; SYNC_LAST_AT=new Date();
        S.screen="home";
      } else {
        SYNC_STATUS="ok";
        S.screen="setup";
      }
    }
  }catch{
    SYNC_STATUS="off";
    try{const p=JSON.parse(localStorage.getItem("pac_profile")||"null");if(p){PROFILE=p;S.screen="home";}else S.screen="setup";}
    catch{S.screen="setup";}
  }
  render();
  // Start rest timer tick if active
  if(S.rest_timer_end)startRestTimerTick();
  // Check notification permission status
  if("Notification" in window)S.notif_permission=Notification.permission;

  // v8.2 — Cross-device sync: re-fetch on app focus
  // v9.1 fix: was only firing on screen==="main", now fires on home too
  document.addEventListener("visibilitychange",async()=>{
    if(document.visibilityState==="visible"&&(S.screen==="main"||S.screen==="home")&&PROFILE){
      try{
        const today=await sbGetToday();
        if(today){
          // Only update EU if more has been used elsewhere (don't rewind)
          if(today.eu_used>S.eu_used)S.eu_used=today.eu_used;
          if(today.checkin&&Object.keys(today.checkin).length>Object.keys(S.ci||{}).length)S.ci=today.checkin;
          if(today.evening_done)S.evening_done=true;
          if(today.midday_done)S.midday_done=true;
          // v10.1: sync canvas blocks across devices
          if(today.canvas_blocks&&Array.isArray(today.canvas_blocks)&&today.canvas_blocks.length){
            S.canvas_blocks=today.canvas_blocks;
          }
          if(today.canvas_date)S.canvas_date=today.canvas_date;
          render();
        }
      }catch{}
    }
  });
}

// ── MOON PHASE (v10.4 Part 4a) ─────────────────────────────────
// Known new moon reference: 2025-01-29. Synodic period = 29.53059 days.
function getLunarAge(dateStr){
  const REF_NEW_MOON = new Date("2025-01-29T12:00:00Z");
  const d = new Date(dateStr+"T12:00:00Z");
  const diffDays = (d - REF_NEW_MOON) / 86400000;
  const PERIOD = 29.53059;
  return ((diffDays % PERIOD) + PERIOD) % PERIOD;
}
function getMoonPhaseName(age){
  if(age<1.85||age>=27.68)return "New moon";
  if(age<7.38)return "Waxing crescent";
  if(age<9.22)return "First quarter";
  if(age<14.77)return "Waxing gibbous";
  if(age<16.61)return "Full moon";
  if(age<22.15)return "Waning gibbous";
  if(age<23.99)return "Last quarter";
  return "Waning crescent";
}
function isNearFullMoon(dateStr){
  const age = getLunarAge(dateStr);
  // Full moon ±3 days = age 11.77–17.61 approx
  return age>=11.77 && age<=17.61;
}
function getMoonEmoji(age){
  if(age<1.85||age>=27.68)return "🌑";
  if(age<7.38)return "🌒";
  if(age<9.22)return "🌓";
  if(age<14.77)return "🌔";
  if(age<16.61)return "🌕";
  if(age<22.15)return "🌖";
  if(age<23.99)return "🌗";
  return "🌘";
}
function renderModifierPills(){
  const today=todayStr();
  const phase=calcPhaseForDate(today)||"";
  const pills=[];
  // Late luteal
  if(phase==="Late luteal") pills.push({icon:"🌒",label:"Late luteal −25%",tip:"You're in late luteal phase — capacity is reduced by ~25%.",col:"rgba(248,113,113,.8)"});
  // Full moon
  const age=getLunarAge(today);
  const moonName=getMoonPhaseName(age);
  const nearFull=isNearFullMoon(today);
  if(nearFull) pills.push({icon:"🌕",label:"Full moon",tip:"Bright moon tonight may affect sleep — consider blackout.",col:"rgba(251,191,36,.8)"});
  // Māramataka (lunar phase name — always shown)
  pills.push({icon:getMoonEmoji(age),label:`Māramataka: ${moonName}`,tip:`You are in the ${moonName} phase of the lunar cycle. Activity alignment guidance coming in a future update.`,col:"rgba(148,163,184,.8)"});
  // Weather modifiers
  if(WEATHER){
    if(WEATHER.uv>7) pills.push({icon:"☀️",label:"UV high −25%",tip:`UV index is ${WEATHER.uv} today — high UV affects energy capacity.`,col:"rgba(251,191,36,.8)"});
    if(WEATHER.temp>26) pills.push({icon:"🌡️",label:`Heat −25%`,tip:`${WEATHER.temp}°C forecast today — heat above 26°C reduces capacity.`,col:"rgba(248,113,113,.7)"});
  }
  // Garmin

async function loadRecentDays(){
  try{
    const today=todayStr();
    const rows=[];
    // Load last 7 days
    for(let i=1;i<=7;i++){
      const d=dateAddDays(today,-i);
      const r=await sbGet("pacing_arc",{device_id:DEVICE_ID(),date:d});
      if(r)rows.push(r);
    }
    RECENT_DAYS=rows;
  }catch(e){RECENT_DAYS=[];}
}

function calcMemoryAdjustment(){
  if(!RECENT_DAYS.length)return null;
  const yesterday=RECENT_DAYS[0]; // most recent
  if(!yesterday)return null;
  const msgs=[];
  let totalReduction=0;

  // Check yesterday's EU use
  const yEuBudget=yesterday.eu_budget||12;
  const yEuUsed=yesterday.eu_used||0;
  const yPct=yEuBudget>0?yEuUsed/yEuBudget:0;

  if(yPct>1.3){totalReduction+=25;msgs.push("EU used >130% yesterday (−25%)");}
  else if(yPct>1.1){totalReduction+=15;msgs.push("EU used >110% yesterday (−15%)");}

  // Check consecutive overuse
  let consecutive=0;
  for(const d of RECENT_DAYS){
    const b=d.eu_budget||12,u=d.eu_used||0;
    if(u/b>1.0)consecutive++;else break;
  }
  if(consecutive>=3){totalReduction+=20;msgs.push("3+ consecutive days over budget (−20%)");}
  else if(consecutive>=2){totalReduction+=10;msgs.push("2 consecutive days over budget (−10%)");}

  // Evening rating carry-forward
  const yCheckin=yesterday.checkin||{};
  const yEvening=yCheckin.evening_rating;
  if(yEvening==="Crashed"){
    totalReduction+=30;
    msgs.push("Yesterday rated Crashed (−30%)");
    // Crash mode persistence
    if(!S.in_crash){S.in_crash=true;}
  } else if(yEvening==="Hard"){totalReduction+=15;msgs.push("Yesterday rated Hard (−15%)");}

  // Recovery bonus
  let goodStreak=0;
  for(const d of RECENT_DAYS.slice(0,3)){
    const ec=d.checkin||{};
    if(ec.evening_rating==="Good"||ec.evening_rating==="Better than expected")goodStreak++;
    else break;
  }
  if(goodStreak>=3){totalReduction-=10;msgs.push("3+ good days in a row (+10% bonus)");}

  // Panic event counts as crashed
  if(yCheckin.panic_event&&yCheckin.panic_event.severity==="severe"){
    totalReduction=Math.max(totalReduction,30);
    msgs.push("Severe panic event yesterday (−30%)");
  }

  if(totalReduction<=0&&msgs.length===0)return null;
  return {pct:Math.min(50,Math.max(-10,totalReduction)),reasons:msgs};
}

function calcPhaseForDate(dateStr){
  if(!PROFILE||!PROFILE.last_period_start||!PROFILE.cycle_length)return null;
  const cycleLen=Number(PROFILE.cycle_length)||28;
  const lps=new Date(PROFILE.last_period_start);
  const target=new Date(dateStr);
  const diffDays=Math.floor((target-lps)/(1000*60*60*24));
  if(diffDays<0)return null;
  const dayOfCycle=(diffDays%cycleLen)+1;
  if(dayOfCycle<=12)return "Follicular";
  if(dayOfCycle<=15)return "Ovulation";
  if(dayOfCycle<=24)return "Luteal";
  return "Late luteal";
}

function phaseTodayAuto(){
  if(!PROFILE||!PROFILE.last_period_start)return null;
  return calcPhaseForDate(todayStr());
}

function getEventTier(euCost){
  if(euCost<=4)return {name:"Small",buffer:2,recovery:1,leadup:1};
  if(euCost<=8)return {name:"Medium",buffer:4,recovery:2,leadup:2};
  if(euCost<=14)return {name:"Large",buffer:6,recovery:3,leadup:3};
  return {name:"Major",buffer:8,recovery:5,leadup:4};
}

// Returns a map of dateStr → bankingMultiplier (0-1) for the given events
function calcBankingModifiers(events,windowStart,windowEnd){
  const mods={}; // dateStr → min multiplier (most restrictive)
  const applyMod=(date,mult)=>{
    if(date<windowStart||date>windowEnd)return;
    if(mods[date]===undefined||mult<mods[date])mods[date]=mult;
  };

  for(const ev of events){
    if(!ev.date||ev.eu_cost===0)continue;
    const tier=getEventTier(ev.eu_cost);
    const buffer=ev.buffer_eu!==undefined?ev.buffer_eu:tier.buffer;
    const recoveryDays=ev.recovery_days!==undefined?ev.recovery_days:tier.recovery;
    const leadup=tier.leadup;

    // Lead-up taper
    const leadupReductions={
      1:[.70],
      2:[.80,.70],
      3:[.90,.80,.70],
      4:[.90,.85,.80,.70]
    };
    const reductions=leadupReductions[leadup]||leadupReductions[3];
    for(let i=0;i<reductions.length;i++){
      const d=dateAddDays(ev.date,-(reductions.length-i));
      applyMod(d,reductions[i]);
    }

    // Recovery days
    const recovMults=[[.60],[.60,.80],[.60,.75,.85],[.60,.75,.80,.90],[.60,.70,.75,.80,.90]];
    const rm=recovMults[Math.min(recoveryDays,5)-1]||recovMults[0];
    for(let i=0;i<rm.length;i++){
      const d=dateAddDays(ev.date,i+1);
      applyMod(d,rm[i]);
    }
  }
  return mods;
}

function getBankingModForDate(dateStr){
  const windowStart=dateAddDays(todayStr(),-1);
  const windowEnd=dateAddDays(todayStr(),90);
  const mods=calcBankingModifiers(EVENTS,windowStart,windowEnd);
  return mods[dateStr]!==undefined?mods[dateStr]:1.0;
}

function gateColour(ci){
  let s=0;
  const e=ci.energy??5, bb=ci.battery??50;
  const bbLow=Number((PROFILE&&PROFILE.bb_low)??5);
  const bbHigh=Number((PROFILE&&PROFILE.bb_high)??65);
  const bbMid=Math.round((bbLow+bbHigh)/2);

  // Body Battery scoring
  if(bb<bbLow)s+=2; else if(bb<bbMid)s+=1;
  // HRV
  if(ci.hrv==="Poor")s+=2; else if(ci.hrv==="Unbalanced")s+=1;
  // Energy
  if(e<4)s+=1;
  // PEM symptoms — weighted spectrum (max 2 pts)
  const syms=ci.symptoms||[];
  let pemScore=0;
  if(syms.includes("Muscle pain"))pemScore+=1;
  if(syms.includes("Muscle tightness"))pemScore+=0.5;
  if(syms.includes("Strongly wired-tired"))pemScore+=1;
  if(syms.includes("Mild wired-tired"))pemScore+=0.5;
  if(syms.includes("Sore throat/flu feeling"))pemScore+=1;
  if(syms.includes("Sensory sensitivity"))pemScore+=0.5;
  const pemCount=pemScore;
  s+=Math.min(2,pemScore);

  let gate=s>=4?"red":s>=2?"yellow":"green";

  // Fix 1 — Objective floor: strong BB+HRV signals cap how low the gate can go.
  const bbStrong = bb >= bbHigh;
  const bbMidOk  = bb >= bbMid;
  const hrvOk    = ci.hrv==="Balanced";
  const hasPEM   = pemScore >= 2;

  if(gate==="red" && !hasPEM){
    if(bbStrong && hrvOk) gate="yellow";
    else if(bbMidOk && hrvOk) gate="yellow";
  }

  return gate;
}

// ── Garmin calibration ratio (v10.2) ─────────────
function calcGarminRatio(ci){
  const baseline_bb  = Number((PROFILE&&PROFILE.garmin_baseline_bb_recharge)||0);
  const baseline_hrv = Number((PROFILE&&PROFILE.garmin_baseline_hrv)||0);
  const today_bb  = ci.garmin_today_bb_recharge;
  const today_hrv = ci.garmin_today_hrv;

  const bb_val  = today_bb && today_bb!=="skip" && baseline_bb>0  ? Number(today_bb)/baseline_bb  : null;
  const hrv_val = today_hrv && today_hrv!=="skip" && baseline_hrv>0 ? Number(today_hrv)/baseline_hrv : null;

  let ratio = 1.0;
  if(bb_val!==null && hrv_val!==null) ratio = (bb_val+hrv_val)/2;
  else if(bb_val!==null) ratio = bb_val;
  else if(hrv_val!==null) ratio = hrv_val;

  return Math.min(1.2, Math.max(0.4, ratio));
}

function garminCalibrationNote(ci){
  const today_bb  = ci.garmin_today_bb_recharge;
  const today_hrv = ci.garmin_today_hrv;
  const baseline_bb  = Number((PROFILE&&PROFILE.garmin_baseline_bb_recharge)||0);
  const baseline_hrv = Number((PROFILE&&PROFILE.garmin_baseline_hrv)||0);
  if((!today_bb || today_bb==="skip") && (!today_hrv || today_hrv==="skip")) return null;
  const ratio = calcGarminRatio(ci);
  const pct = Math.round(ratio*100);
  const parts=[];
  if(today_bb&&today_bb!=="skip"&&baseline_bb>0) parts.push(`BB +${today_bb}/+${baseline_bb}`);
  if(today_hrv&&today_hrv!=="skip"&&baseline_hrv>0) parts.push(`HRV ${today_hrv}/${baseline_hrv}ms`);
  return parts.length ? `${parts.join(" · ")} → ${pct}% capacity` : null;
}

function euBudget(ci,bankingMod){
  const e=ci.energy??5;
  const bb=ci.battery??50;
  const bbLow=Number((PROFILE&&PROFILE.bb_low)??5);
  const bbHigh=Number((PROFILE&&PROFILE.bb_high)??65);
  const bbMid=Math.round((bbLow+bbHigh)/2);
  const hrvOk=ci.hrv==="Balanced";

  let base;
  const bbMidOk = bb >= bbMid;
  const objectiveOk = bbMidOk && hrvOk;

  if(objectiveOk && e<=3){
    base = Math.round(DEFAULT_EU.typical * 0.90);
  } else if(e>=8){
    base = DEFAULT_EU.high;
  } else if(e<=3){
    base = DEFAULT_EU.low;
  } else {
    base = DEFAULT_EU.typical;
  }

  // Garmin calibration ratio (v10.2) — applies to typical base only
  const garminRatio = calcGarminRatio(ci);
  if(garminRatio !== 1.0 && base === DEFAULT_EU.typical){
    base = Math.round(DEFAULT_EU.typical * garminRatio);
  }

  // Sleep score modifier
  const sleep=ci.sleep??65;
  if(sleep<40)base=Math.round(base*.85);
  else if(sleep<60)base=Math.round(base*.95);

  // Phase
  const phase=ci.phase||"Not tracking";
  if(phase==="Luteal")base=Math.round(base*.8);
  if(phase==="Late luteal")base=Math.round(base*.75);

  // Environmental
  const env=ci.env||[];
  // Environmental modifiers — temp/UV from weather auto-fill; sleep hours from check-in field
  const sleepHours=ci.sleep_hours!==undefined&&ci.sleep_hours!==""?Number(ci.sleep_hours):null;
  const sleepShort=sleepHours!==null&&sleepHours<6;
  if(env.includes("Temp >26°C")||env.includes("UV >7")||sleepShort)base=Math.round(base*.75);

  // Food timing modifier — fasting from wake-up compounds sleep inertia
  const eaten=ci.eaten_yet;
  if(eaten==="Not yet")base=Math.round(base*.92);        // −8%
  else if(eaten==="Coffee / drink only")base=Math.round(base*.95); // −5%

  // Banking modifier + gate multiplier: cap combined effect at 55% of phase-adjusted base
  const phaseAdjustedBase = base; // capture before banking/gate
  if(bankingMod!==undefined&&bankingMod<1)base=Math.round(base*bankingMod);

  // Gate multiplier
  const g=gateColour(ci);
  if(g==="yellow")base=Math.round(base*.75);  // v8.2: raised from 0.65
  if(g==="red")base=Math.round(base*.4);

  // Cap: banking + gate together cannot reduce below 55% of phase-adjusted base
  const combinedFloor = Math.round(phaseAdjustedBase * 0.55);
  if(base < combinedFloor) base = combinedFloor;

  const result=Math.max(5,base);  // v8.2: floor raised from 3 to 5
  return result;
}

    priorityNames=["Medication prep","Meal prep — light","Getting dressed","Dishwashing block","Nervous system regulation"];
  } else if(gate==="yellow"){
    priorityNames=["Shower","Getting dressed","Meal prep — light","Medication prep","Dishwashing block","Habit logging","Reading / screens"];
  } else {
    priorityNames=["Shower","Getting dressed","Meal prep — light","Medication prep","Light computer work","Dishwashing block","Habit logging"];
  }
  let euLeft=eu;
  const fittingTasks=[];
  for(const name of priorityNames){
    // Use tier-appropriate cost for this gate, fall back to base cost
    const tierEu = tierEuForGate(name, gate);
    const baseCost = tierEu ?? taskCosts[name];
    if(baseCost===undefined) continue;
    const cost = ortho && STANDING_TASKS.includes(name) ? Math.ceil(baseCost*1.5) : baseCost;
    if(euLeft>=cost){fittingTasks.push([name,cost,ortho&&STANDING_TASKS.includes(name)]);euLeft-=cost;}
    if(fittingTasks.length>=4)break;
  }

  // Warnings
  const warnings=[];
  if(pemCount>=1)warnings.push("PEM signals present — stop at first sign of worsening");
  if(bb<40)warnings.push("Body Battery very low — prioritise rest over tasks");
  if(ci.hrv==="Poor")warnings.push("HRV poor — minimal exertion today");
  if((ci.env||[]).includes("Temp >26°C"))warnings.push("Heat increases energy cost — stay cool");
  if((ci.env||[]).includes("UV >7"))warnings.push("High UV — limit time outdoors");
  if(ci.phase==="Late luteal")warnings.push("Late luteal phase — extra rest built into budget");
  if(ci.rhr&&Number(ci.rhr)>75)warnings.push("Elevated resting HR — keep HR well below "+at+" bpm");
  if(bankingMod<1)warnings.push("Banking active — budget reduced for upcoming event");
  if(!warnings.length)warnings.push("No major drift signals — stay within your EU budget");

  return {gate, eu, at, restRatio, tasks:fittingTasks, warnings, euLeft:eu, bankingMod};
}

// ═══════════════════════════════════════════════════
// FORECAST EU (v4.3)
// ═══════════════════════════════════════════════════
function forecastEuForDate(dateStr){
  const phase=calcPhaseForDate(dateStr)||"Not tracking";
  const bankingMod=calcBankingModifiers(EVENTS,dateStr,dateStr)[dateStr]??1.0;
  let base=DEFAULT_EU.typical;
  if(phase==="Luteal")base=Math.round(base*.8);
  if(phase==="Late luteal")base=Math.round(base*.75);
  if(bankingMod<1)base=Math.round(base*bankingMod);
  return Math.max(3,base);
}

function getEventsForDate(dateStr){
  const direct = EVENTS.filter(e=>e.date===dateStr);
  // Include virtual spread-day copies from events on preceding days
  const spread = [];
  EVENTS.forEach(ev=>{
    if(!ev.spread_days || ev.spread_days<=1) return;
    if(ev.date===dateStr) return; // already included in direct
    for(let d=1;d<ev.spread_days;d++){
      if(dateAddDays(ev.date,d)===dateStr){
        const perDay = ev.eu_cost / ev.spread_days;
        spread.push({
          ...ev,
          id: ev.id+"_spread_"+d,
          date: dateStr,
          eu_cost: Math.round(perDay*10)/10,
          title: ev.title+" (day "+(d+1)+")",
          _spread_virtual: true,
        });
      }
    }
  });
  return [...direct, ...spread];
}

// ═══════════════════════════════════════════════════
// SMART SCHEDULER (v4.4)
// ═══════════════════════════════════════════════════
function scoreDay(dateStr, template){
  let score=100;
  const reasons=[];
  const warnings=[];

  // 1. Cycle phase
  const phase=calcPhaseForDate(dateStr);
  if(phase==="Late luteal"){score-=30;warnings.push("Late luteal phase");}
  else if(phase==="Luteal"){score-=15;warnings.push("Luteal phase");}

  // 2. Adjacent events
  const dayEvents=getEventsForDate(dateStr);
  const dayBefore=getEventsForDate(dateAddDays(dateStr,-1));
  const dayAfter=getEventsForDate(dateAddDays(dateStr,1));
  const twoBefore=getEventsForDate(dateAddDays(dateStr,-2));
  const twoAfter=getEventsForDate(dateAddDays(dateStr,2));
  if(dayEvents.length){score-=25;warnings.push("Event same day");}
  else if(dayBefore.length){score-=15;warnings.push("Event day before");}
  else if(dayAfter.length){score-=10;warnings.push("Event day after");}
  else if(twoBefore.length||twoAfter.length){score-=5;}

  // 3. EU headroom
  const forecastEU=forecastEuForDate(dateStr);
  const needed=(template.eu_cost||0)+(template.buffer_eu||2);
  const headroom=forecastEU-needed;
  if(headroom>=8){/* fine */}
  else if(headroom>=4){score-=10;reasons.push("Some EU pressure");}
  else if(headroom>=1){score-=20;warnings.push("Tight EU headroom");}
  else{score-=25;warnings.push("Insufficient EU headroom");}

  // 4. Consecutive active days
  let streak=0;
  for(let i=1;i<=3;i++){
    const prev=dateAddDays(dateStr,-i);
    if(getEventsForDate(prev).length)streak++;
    else break;
  }
  if(streak>=3){score-=15;warnings.push("3+ active days in a row");}
  else if(streak>=2){score-=10;warnings.push("2 active days in a row");}

  // 5. Time of day preference (minor)
  if(template.preferred_time&&template.preferred_time!=="any"){
    // Basic check — we don't have per-hour data so mild deduction
    score-=2;
  }

  score=Math.max(0,score);
  const label=score>=80?"Good slot":score>=55?"Okay slot":score>=30?"Higher risk":"Not recommended";
  const col=score>=80?"score-green":score>=55?"score-yellow":score>=30?"score-orange":"score-red";

  const allIssues=[...warnings,...reasons];
  let explanation="";
  if(score>=80){
    const phaseStr=phase&&phase!=="Not tracking"?phase+" phase":"";
    explanation=(phaseStr?"Good EU headroom, "+phaseStr.toLowerCase()+", no adjacent events.":"Good EU headroom and no adjacent events.");
  } else {
    explanation=allIssues.length?allIssues.join(", ")+"." :"Some constraints on this day.";
  }

  return {score,label,col,explanation,warnings,phase:phase||"Unknown",headroom,dateStr};
}

function runScheduler(template,windowDays=28){
  const results=[];
  const today=todayStr();
  for(let i=1;i<=windowDays;i++){
    const d=dateAddDays(today,i);
    results.push(scoreDay(d,template));
  }
  results.sort((a,b)=>b.score-a.score);
  return results.slice(0,3);
}

let restTimerInterval=null;
function startRestTimer(){
  const mins=S.gate==="green"?20:S.gate==="yellow"?30:45;
  S.rest_timer=mins*60;
  S.rest_timer_end=Date.now()+mins*60*1000;
  startRestTimerTick();
}
function startRestTimerTick(){
  if(restTimerInterval)clearInterval(restTimerInterval);
  restTimerInterval=setInterval(()=>{
    const remaining=Math.max(0,Math.round((S.rest_timer_end-Date.now())/1000));
    S.rest_timer=remaining;
    if(remaining<=0){
      clearInterval(restTimerInterval);
      restTimerInterval=null;
      S.rest_timer=null;
      S.rest_timer_end=null;
      // Vibrate/notify
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
      // v8.2 — offer log + EU return
      const gate=S.gate||"green";
      const mins=gate==="green"?20:gate==="yellow"?30:45;
      const euReturn=gate==="green"?1:gate==="yellow"?1.5:2;
      S.pending_rest_return={eu:euReturn,mins};
      render();
      return;
    }
    // Update timer display without full re-render
    const el=document.getElementById("rest-timer-display");
    if(el)el.textContent=fmtTimer(remaining);
  },1000);
}
function fmtTimer(s){return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;}

// BEDTIME & WAKE CALCULATOR (v5.2 — Refinement 13)
// ═══════════════════════════════════════════════════
function calcBedtime(){
  // Find earliest commitment tomorrow or today-remaining
  const now=new Date();
  const tomorrow=dateAddDays(todayStr(),1);
  const dayAfter=dateAddDays(todayStr(),2);

  // Look for events in next 2 days
  const tomorrowEvents=getEventsForDate(tomorrow);
  const todayEvents=getEventsForDate(todayStr()).filter(e=>{
    // Only future events today
    return true; // We don't have time data, so include all
  });

  // Profile sleep params (with defaults matching user's profile)
  const onsetMins=Number((PROFILE&&PROFILE.sleep_onset_mins)??30);
  const tibHours=Number((PROFILE&&PROFILE.time_in_bed_hours)??8.5);
  const bufferMins=Number((PROFILE&&PROFILE.functional_buffer_mins)??45);
  const winddownMins=Number((PROFILE&&PROFILE.winddown_mins)??75);

  // Find first commitment: check tomorrow's events or a default morning start
  // If no events, assume 9:00 as default first-commitment window
  let firstCommitmentH=9, firstCommitmentM=0;
  let commitmentLabel="morning";

  // Check tomorrow events — use 9am as proxy since we don't store times
  // But if gate is crash day, push back +1hr
  if(tomorrowEvents.length){
    // Large/major events probably have earlier start
    const bigEvent=tomorrowEvents.find(e=>e.eu_cost>=9);
    if(bigEvent){firstCommitmentH=9;firstCommitmentM=0;commitmentLabel=bigEvent.title;}
    else{firstCommitmentH=10;firstCommitmentM=0;commitmentLabel=tomorrowEvents[0].title;}
  }

  // Gate-dependent departure (from restatement): green=earliest, yellow=+30-60, red=+60-90
  const gateOffset=S.gate==="red"?75:S.gate==="yellow"?45:0;
  firstCommitmentM+=gateOffset;
  if(firstCommitmentM>=60){firstCommitmentH+=Math.floor(firstCommitmentM/60);firstCommitmentM=firstCommitmentM%60;}

  // latest wake = first_commitment_time - functional_buffer
  let wakeH=firstCommitmentH, wakeM=firstCommitmentM-bufferMins;
  if(wakeM<0){wakeH--;wakeM+=60;}

  // latest bedtime = wake - time_in_bed
  let bedH=wakeH, bedM=wakeM-Math.round(tibHours*60);
  while(bedM<0){bedH--;bedM+=60;}

  // wind-down prompt = bedtime - winddown_mins
  let windH=bedH, windM=bedM-winddownMins;
  while(windM<0){windH--;windM+=60;}

  // Crash day modifier: +60 mins in bed
  const crashBonus=S.in_crash?60:0;
  if(crashBonus){
    bedM-=crashBonus;
    while(bedM<0){bedH--;bedM+=60;}
    windM-=crashBonus;
    while(windM<0){windH--;windM+=60;}
  }

  const fmt=(h,m)=>{
    const hh=((h%24)+24)%24;
    return `${String(hh).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
  };

  // MHMR conflict check: wind-down before 21:30?
  const windTotalMins=(((windH%24)+24)%24)*60+windM;
  const mhmrMins=21*60+30;
  const mhmrConflict=windTotalMins>mhmrMins;

  return {
    commitment:commitmentLabel,
    commitmentTime:fmt(firstCommitmentH,firstCommitmentM),
    wakeTime:fmt(wakeH,wakeM),
    bedTime:fmt(bedH,bedM),
    winddownTime:fmt(windH,windM),
    mhmrConflict,
    crashBonus:crashBonus>0,
    tomorrowEvents
  };
}

async function markMaintenanceDone(taskId){
  MAINTENANCE_LOG[taskId]=todayStr();
  await saveMaintenanceLog();
}

function getMaintenanceDue(){
  const log=getMaintenanceLog();
  const today=new Date(todayStr());
  return DEFAULT_MAINTENANCE.map(t=>{
    const lastDone=log[t.id]?new Date(log[t.id]):null;
    const daysSince=lastDone?Math.floor((today-lastDone)/(1000*60*60*24)):t.frequency_days+1;
    const isDue=daysSince>=t.frequency_days;
    const isOverdue=daysSince>=t.frequency_days*1.5;
    const dueInDays=lastDone?Math.max(0,t.frequency_days-daysSince):0;
    return {...t,lastDone:log[t.id]||null,daysSince,isDue,isOverdue,dueInDays};
  }).sort((a,b)=>{
    // Sort: overdue first, then due, then upcoming; within each by priority
    const urgencyA=a.isOverdue?0:a.isDue?1:2;
    const urgencyB=b.isOverdue?0:b.isDue?1:2;
    if(urgencyA!==urgencyB)return urgencyA-urgencyB;
    const pOrd={high:0,normal:1,low:2};
    return (pOrd[a.priority]||1)-(pOrd[b.priority]||1);
  });
}

// UV-aware laundry window (uses WEATHER data)
function getLaundryWindow(){
  if(!WEATHER||!WEATHER.daily)return null;
  const uv=WEATHER.uv;
  const canHang=uv<2;
  // Check rain probability — if available
  const rain=WEATHER.daily.precipitation_probability_max?WEATHER.daily.precipitation_probability_max[0]:null;
  const canBringIn=uv<2&&(rain===null||rain<30);
  return {canHang,canBringIn,uv,rain,hasIndoorLine:true};
}

// Suggest maintenance tasks that fit in remaining EU
function getSuggestedMaintenance(remainingEU){
  const due=getMaintenanceDue().filter(t=>t.isDue);
  const gate=S.gate||"green";
  // Crash/red: critical tasks only
  const tasks=gate==="red"?due.filter(t=>t.priority==="high"):due;
  // Fit within EU
  const fits=[];let eu=0;
  for(const t of tasks){
    if(eu+t.eu_cost<=remainingEU){fits.push(t);eu+=t.eu_cost;}
  }
  return fits;
}

function whatNowSuggestion(){
  const gate=S.gate||"green";
  const h=new Date().getHours();
  const euRem=S.eu_budget-S.eu_used;
  const euPctUsed=S.eu_budget>0?(S.eu_used/S.eu_budget):0;
  const inDeficit=euRem<0;
  const timerRunning=S.rest_timer!==null;

  // Timer is already running
  if(timerRunning) return {icon:"🛋",text:"You're already resting — that's exactly right. Stay with it."};

  // In deficit: always rest
  if(inDeficit) return {icon:"🔴",text:"You've gone past your budget. The kindest thing now is to lie down and do nothing."};

  // Red gate: always rest
  if(gate==="red") return {icon:"🛋",text:"Red gate — lie down now. Body wipe or drink water is always okay. Nothing else."};

  const todayPlan=S.plan&&S.plan.tasks?S.plan.tasks:[];
  const loggedTasks=(S.activity_log||[]).map(e=>e.task.split(" (")[0]);
  const nextTask=todayPlan.find(([name])=>!loggedTasks.includes(name));

  // Yellow gate — depends on time
  if(gate==="yellow"){
    if(h>=21) return {icon:"🌙",text:"Wind-down time. Close screens, dim lights, and move toward rest."};
    if(h>=14&&euPctUsed>0.6) return {icon:"🛋",text:"More than half your budget is spent and the afternoon is here. A rest now protects tomorrow."};
    if(nextTask) return {icon:"⚡",text:`Drink some water first, then: ${nextTask[0]} (${nextTask[1]} EU).`};
    return {icon:"💧",text:"Drink some water. Your task list is clear — gentle rest is the best next move."};
  }

  // Green gate
  if(h>=21) return {icon:"🌙",text:"Wind-down time — the day's work is done. Start settling."};
  if(nextTask) return {icon:"✅",text:`Your next priority: ${nextTask[0]} (${nextTask[1]} EU). You have ${euRem > 0 ? euRem : 0} EU remaining.`};
  return {icon:"🌿",text:`You've handled your priorities. ${euRem>3?"A restorative practice would use your remaining energy well.":"Rest and let the day settle."}`};
}

// v9.0 — EVENING CLOSE-OUT LOOP
// ═══════════════════════════════════════════════════
function generateCloseout(){
  const euUsed=S.eu_used;
  const euBudget=S.eu_budget;
  const over=euUsed>euBudget;
  const diff=Math.abs(euUsed-euBudget);

  // Tomorrow's projected budget
  const bankMod=getBankingModForDate(dateAddDays(todayStr(),1));
  const tomorrowEu=Math.max(5,Math.round(forecastEuForDate(dateAddDays(todayStr(),1))*(over?0.85:1)));

  // Gate accuracy
  const gateHeld=S.ci.evening_feel!=="Much worse"&&S.ci.evening_feel!=="Worse";

  // One thing to protect tonight
  const now=new Date();
  const winddown=calcBedtime();
  const windMins=parseInt(winddown.winddownTime.split(":")[0])*60+parseInt(winddown.winddownTime.split(":")[1]);
  const nowMins=now.getHours()*60+now.getMinutes();
  const minsToWind=windMins-nowMins;

  let protectNote="";
  if(S.ci.sleep<60) protectNote="Your sleep score has been low — screens off 60 min before bed would help most.";
  else if(minsToWind>0&&minsToWind<60) protectNote=`Wind-down starts in ${minsToWind} minutes — start settling now.`;
  else if(S.ci.eaten_yet==="Not yet") protectNote="First meal within an hour of waking tomorrow — it helps your energy read more accurately.";
  else protectNote=`Aim to be asleep by ${winddown.bedTime}. A calm wind-down from ${winddown.winddownTime} helps overnight stress.`;

  return {euUsed,euBudget,over,diff,tomorrowEu,gateHeld,protectNote,bankMod};
}

function getRecoveryPrompts(){
  const today=todayStr();
  const prompts=[];
  for(const ev of EVENTS){
    if(!ev.recovery_days||ev.recovery_days<1)continue;
    if(S.recovery_prompts_dismissed[ev.id])continue;
    if(ev.recovery_feedback)continue; // already answered
    // Show 24–48 hours after event
    const daysSince=daysBetween(ev.date,today);
    if(daysSince>=1&&daysSince<=2){
      prompts.push(ev);
    }
  }
  return prompts;
}

// ── Expiry helpers (v7.0) ─────────────────────────
function expiryDateFromDays(days){ if(days==null||days==="")return null; const d=new Date(); d.setDate(d.getDate()+Number(days)); return d.toISOString().slice(0,10); }
function daysFromExpiryDate(dateStr){ if(!dateStr)return null; const diff=Math.round((new Date(dateStr)-new Date(new Date().toISOString().slice(0,10)))/(1000*60*60*24)); return diff; }
function migrateExpiry(item){ // convert old days_to_expiry → expiry_date if not yet migrated
  if(!item.expiry_date && item.days_to_expiry!=null){ item.expiry_date=expiryDateFromDays(item.days_to_expiry); }
  // always recompute days_to_expiry dynamically
  item.days_to_expiry = item.expiry_date ? daysFromExpiryDate(item.expiry_date) : null;
  return item;
}
function migrateAllExpiry(){ INGREDIENT_INVENTORY=INGREDIENT_INVENTORY.map(migrateExpiry); READY_COMPONENTS=READY_COMPONENTS.map(migrateExpiry); }

async function loadMealData(){
  try{
    const row = await sbGet("pacing_arc", {device_id:DEVICE_ID(), date:"meal_data"});
    if(row && row.checkin){
      INGREDIENT_INVENTORY = row.checkin.ingredients || [];
      READY_COMPONENTS = row.checkin.components || [];
    } else {
      const local = localStorage.getItem("pac_meal_data");
      if(local){ const d=JSON.parse(local); INGREDIENT_INVENTORY=d.ingredients||[]; READY_COMPONENTS=d.components||[]; }
    }
  } catch {
    try{
      const local = localStorage.getItem("pac_meal_data");
      if(local){ const d=JSON.parse(local); INGREDIENT_INVENTORY=d.ingredients||[]; READY_COMPONENTS=d.components||[]; }
    }catch{}
  }
  migrateAllExpiry(); // v7.0 — convert legacy days_to_expiry → expiry_date, recompute dynamically
}

async function saveMealData(){
  const data = {ingredients: INGREDIENT_INVENTORY, components: READY_COMPONENTS};

function getUrgentComponents(){

// v6.3 — Wake-up check: visible 20–90 min after morning check-in
function shouldShowWakeupCheck(){
  if(!S.checkin_submitted_at) return false;
  if(S.wakeup_check_dismissed || S.wakeup_check_done) return false;
  const mins = (Date.now() - S.checkin_submitted_at) / 60000;
  return mins >= 20 && mins <= 90;
}

function applyWakeupRefresh(newBb, newEnergy, newSymptoms){
  // Rebuild ci with updated values, recalculate gate + EU
  const refreshedCi = {...S.ci, battery:newBb, energy:newEnergy, symptoms:newSymptoms||S.ci.symptoms||[]};
  const newGate = gateColour(refreshedCi);
  const bankingMod = calcBankingModifier ? calcBankingModifier() : undefined;
  const newBudget = euBudget(refreshedCi, bankingMod);

  // Store refresh record
  const refresh = {
    time: new Date().toISOString(),
    battery: newBb, energy: newEnergy, symptoms: newSymptoms||[],
    gate_before: S.gate, eu_before: S.eu_budget,
    gate_after: newGate, eu_after: newBudget
  };
  S.ci.refresh = refresh;

  // Only increase EU — don't penalise for updating
  if(newBudget > S.eu_budget){
    const diff = newBudget - S.eu_budget;
    S.eu_budget = S.eu_budget + diff; // add to remaining, don't refund spent
  }
  // Gate always updates if it changed
  S.gate = newGate;
  S.drift_signals = driftCheck(refreshedCi);
  S.project_readiness = calcProjectReadiness();
  S.dissociation_risk = checkDissociationRisk();
  S.wakeup_check_done = true;
  syncToday();
}

function showToast(msg, color){

  const t=document.createElement("div");
  t.style.cssText=`position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1e1e2e;border:1.5px solid ${c};color:${c};padding:10px 20px;border-radius:10px;font-size:.85rem;font-weight:600;z-index:9999;max-width:320px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5)`;

function commitRetroactiveLog(timeStr){
  if(!S.retroactive_task)return;
  const {task,cost}=S.retroactive_task;
  S.eu_used+=cost;
  if(!S.activity_log)S.activity_log=[];
  const entry={task,cost,time:timeStr,retroactive:true};
  S.activity_log.push(entry);
  S.activity_log.sort((a,b)=>a.time.localeCompare(b.time));
  S.show_retroactive_sheet=false;
  S.retroactive_task=null;
  startRestTimer();
  render();syncToday();
  showToast(`Logged: ${task} (${timeStr})`);
}

function bindSetup(){
  const steps=getSetupSteps();
  document.getElementById("setup-back")?.addEventListener("click",()=>{S.setup_step--;render();});
  const step=steps[S.setup_step];
  const inp=document.getElementById("setup-in");
  if(inp)inp.addEventListener("input",e=>{
    S.setup_data[step.id]=e.target.value;
    if(step.type!=="textarea"&&step.id!=="at_override")document.getElementById("setup-next").disabled=!e.target.value.trim();
  });
  document.querySelectorAll(".choice").forEach(b=>b.addEventListener("click",()=>{
    S.setup_data[step.id]=b.dataset.v;
    // If cycle_track changed, re-render to update step count
    if(step.id==="cycle_track")render();
    else{document.querySelectorAll(".choice").forEach(x=>x.classList.remove("sel"));b.classList.add("sel");document.getElementById("setup-next").disabled=false;}
  }));
  document.getElementById("setup-next")?.addEventListener("click",async()=>{
    if(S.setup_step<steps.length-1){S.setup_step++;render();return;}
    PROFILE={
      name:S.setup_data.name||"",
      age:S.setup_data.age||40,
      at_override:S.setup_data.at_override||"",
      severity:S.setup_data.severity||"Moderate — significantly limited",
      supplements:S.setup_data.supplements||"",
      cycle_length:S.setup_data.cycle_length||28,
      last_period_start:S.setup_data.last_period_start||""
    };
    try{await sbSaveProfile(PROFILE);SYNC_STATUS="ok";}catch{SYNC_STATUS="off";localStorage.setItem("pac_profile",JSON.stringify(PROFILE));}
    // Save recurring activity templates if entered

function renderCheckin(){
  const step=CI_STEPS[S.ci_step];
  // Pre-fill phase from cycle calc
  if(step.id==="phase"&&!S.ci.phase){const ph=phaseTodayAuto();if(ph)S.ci.phase=ph;}
  const val=S.ci[step.id]??(step.type==="slider"?step.def:step.type==="multi"?[]:"");
  const pct=Math.round(((S.ci_step+1)/CI_STEPS.length)*100);
  let inputH="";
  if(step.type==="slider"){
    const c=step.col(val),l=step.lbl(val);
    inputH=`<div class="sl-row"><span style="color:var(--muted);font-size:.75rem">${step.min}</span><span class="sl-val" style="color:${c}">${val} — ${l}</span><span style="color:var(--muted);font-size:.75rem">${step.max}</span></div>
    <div style="position:relative;height:6px;background:var(--bg3);border-radius:3px;margin-bottom:5px"><div style="position:absolute;left:0;top:0;height:100%;width:${((val-step.min)/(step.max-step.min))*100}%;background:${c};border-radius:3px" id="sl-fill"></div></div>
    <input type="range" id="sl" min="${step.min}" max="${step.max}" value="${val}" style="accent-color:${c}"/>`;
  }else if(step.type==="choice"){
    inputH=`<div class="choices">${step.opts.map((o,i)=>`<button class="choice${val===o?" sel":""}" data-v="${o}" style="${val===o?`border-color:${step.cols[i]}!important;background:${step.cols[i]}18;color:${step.cols[i]}`:""}">${["🔴","🟠","🟡","🟢","⚪"][i]||"•"} ${o}</button>`).join("")}</div>`;
  }else if(step.type==="multi"){
    inputH=`<div class="tags">${step.opts.map(o=>`<button class="tag${val.includes(o)?" sel":""}" data-v="${o}">${o}</button>`).join("")}</div>`;
  }else if(step.type==="sleep_duration"){
    // Hours + minutes dual input (v9.1)
    const totalHrs = val !== "" && val !== undefined ? Number(val) : "";
    const hrs = totalHrs !== "" ? Math.floor(totalHrs) : "";
    const mins = totalHrs !== "" ? Math.round((totalHrs - Math.floor(totalHrs)) * 60) : "";
    inputH=`<div style="display:flex;align-items:center;gap:10px">
      <input type="number" id="sleep-hrs" class="text-in" style="width:80px;text-align:center;font-size:1.1rem" min="0" max="24" value="${hrs}" placeholder="h"/>
      <span style="color:var(--muted);font-size:.875rem">hrs</span>
      <input type="number" id="sleep-mins" class="text-in" style="width:80px;text-align:center;font-size:1.1rem" min="0" max="59" value="${mins}" placeholder="min"/>
      <span style="color:var(--muted);font-size:.875rem">min</span>
    </div>`;
  }else if(step.type==="number_or_skip"){
    inputH=`<div style="display:flex;flex-direction:column;gap:12px">
      <div style="display:flex;align-items:center;gap:10px">
        <input type="number" id="num-skip-in" class="text-in" style="width:90px;text-align:center;font-size:1.1rem" value="${val==="skip"?"":val}" placeholder="${step.ph}"/>
        <span style="color:var(--muted);font-size:.875rem">${step.unit}</span>
      </div>
      <button id="ci-skip-btn" style="background:none;border:1px solid var(--border)!important;border-radius:8px;padding:8px 16px;font-size:.78rem;color:var(--muted);cursor:pointer;align-self:flex-start">Skip — not available today</button>
    </div>`;
  }else if(step.type==="number"){
    inputH=`<div style="display:flex;align-items:center;gap:10px"><input type="number" id="num-in" class="text-in" style="width:90px;text-align:center;font-size:1.1rem" value="${val}" placeholder="${step.ph}"/><span style="color:var(--muted);font-size:.875rem">${step.unit}</span></div>`;
  }else{
    inputH=`<textarea id="txt-in" class="text-in" style="width:100%;min-height:72px" placeholder="${step.ph}">${val}</textarea>`;
  }
  const canGo=step.type==="slider"||step.type==="text"||step.type==="sleep_duration"||step.type==="number_or_skip"||(step.type==="choice"&&val)||(step.type==="multi"&&val.length)||(step.type==="number"&&val);
  const isLast=S.ci_step===CI_STEPS.length-1;
  // v9.1 — time-aware check-in label
  const ciHour=new Date().getHours();
  const ciLabel="Start of day";
  return `<div style="display:flex;flex-direction:column;min-height:100vh" class="safe-t">
    <div class="header"><button class="btn-ghost" id="ci-back">←</button>
      <div style="flex:1"><div style="height:3px;background:var(--bg3);border-radius:2px"><div style="height:100%;width:${pct}%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))"></div></div></div>
      <span style="color:var(--muted);font-size:.75rem">${S.ci_step+1}/${CI_STEPS.length}</span></div>
    <div class="section in" style="padding-top:24px">
      <h3 style="margin-bottom:6px">${ciLabel}</h3>
      <h2 style="margin-bottom:8px">${step.q}</h2>
      <p style="color:var(--muted);font-size:.8rem;margin-bottom:22px">${step.hint}</p>
      ${inputH}
    </div>
    <div style="padding:16px 18px;max-width:600px;width:100%;margin:0 auto" class="safe-b">
      <button class="btn btn-primary" id="ci-next" style="width:100%" ${canGo?"":"disabled"}>${isLast?"✨ Get my plan":"Next →"}</button>
      ${isLast?`<p style="color:var(--muted);font-size:.75rem;text-align:center;margin-top:8px">Plans field is optional</p>
      <p style="color:var(--muted);font-size:.72rem;text-align:center;margin-top:6px;line-height:1.5">This is your starting estimate — if you feel more awake after 20 minutes, you can update it from your plan.</p>`:""}
    </div>
  </div>`;
}
function bindCheckin(){
  document.getElementById("ci-back")?.addEventListener("click",()=>{if(S.ci_step>0){S.ci_step--;render();}else{S.screen="home";render();}});
  const step=CI_STEPS[S.ci_step];
  document.getElementById("sl")?.addEventListener("input",e=>{
    const v=Number(e.target.value);S.ci[step.id]=v;
    const c=step.col(v),l=step.lbl(v);
    const lbl=document.querySelector(".sl-val"),fill=document.getElementById("sl-fill");
    if(lbl){lbl.textContent=`${v} — ${l}`;lbl.style.color=c;}
    if(fill){fill.style.width=`${((v-step.min)/(step.max-step.min))*100}%`;fill.style.background=c;}
    document.getElementById("ci-next").disabled=false;
  });
  document.querySelectorAll(".choice").forEach(b=>b.addEventListener("click",()=>{S.ci[step.id]=b.dataset.v;render();}));
  document.querySelectorAll(".tag").forEach(b=>b.addEventListener("click",()=>{
    const v=b.dataset.v;let cur=S.ci[step.id]||[];
    if(v==="None"){cur=["None"];}else{cur=cur.filter(x=>x!=="None");cur=cur.includes(v)?cur.filter(x=>x!==v):[...cur,v];}
    S.ci[step.id]=cur;render();
  }));
  document.getElementById("num-in")?.addEventListener("input",e=>{S.ci[step.id]=e.target.value;document.getElementById("ci-next").disabled=!e.target.value;});
  document.getElementById("txt-in")?.addEventListener("input",e=>{S.ci[step.id]=e.target.value;});
  // number_or_skip fields (Garmin recharge, HRV)
  document.getElementById("num-skip-in")?.addEventListener("input",e=>{
    S.ci[step.id]=e.target.value||"";
  });
  document.getElementById("ci-skip-btn")?.addEventListener("click",()=>{
    S.ci[step.id]="skip";
    if(S.ci_step<CI_STEPS.length-1){S.ci_step++;render();}
  });
  // v9.1 — sleep duration: hours + minutes fields → store as decimal hours
  const sleepHrsEl=document.getElementById("sleep-hrs");
  const sleepMinsEl=document.getElementById("sleep-mins");
  if(sleepHrsEl||sleepMinsEl){
    const updateSleepDuration=()=>{
      const h=Number(sleepHrsEl?.value||0);
      const m=Number(sleepMinsEl?.value||0);
      if(sleepHrsEl?.value!==undefined&&sleepHrsEl?.value!==""||sleepMinsEl?.value!==undefined&&sleepMinsEl?.value!==""){
        S.ci[step.id]=h+m/60;
      }
    };
    sleepHrsEl?.addEventListener("input",updateSleepDuration);
    sleepMinsEl?.addEventListener("input",updateSleepDuration);
  }
  document.getElementById("ci-next")?.addEventListener("click",()=>{
    if(S.ci_step<CI_STEPS.length-1){S.ci_step++;render();return;}
    S.gate=gateColour(S.ci);
    const bankingMod=getBankingModForDate(todayStr());
    S.eu_budget=euBudget(S.ci,bankingMod);
    // Apply multi-day memory adjustment if any
    if(S.memory_adjustment&&S.memory_adjustment.pct>0){
      S.eu_budget=Math.max(5,Math.round(S.eu_budget*(1-S.memory_adjustment.pct/100)));
    } else if(S.memory_adjustment&&S.memory_adjustment.pct<0){
      // Recovery bonus
      S.eu_budget=Math.round(S.eu_budget*(1+Math.abs(S.memory_adjustment.pct)/100));
    }
    S.eu_used=0;
    S.activity_log=[];  // v8.2 — fresh log for new day
    S.drift_signals=driftCheck(S.ci);
    { const cs=S.ci.symptoms||[]; let cs_score=0;
  if(cs.includes("Muscle pain"))cs_score+=1; if(cs.includes("Muscle tightness"))cs_score+=0.5;
  if(cs.includes("Strongly wired-tired"))cs_score+=1; if(cs.includes("Mild wired-tired"))cs_score+=0.5;
  if(cs.includes("Sore throat/flu feeling"))cs_score+=1;
  S.in_crash=S.gate==="red"&&cs_score>=2; }
    S.plan=generatePlan(S.ci);
    // v6.0 cognitive layer
    S.cu_budget=calcCUBudget(S.ci.taha_hinengaro);
    S.cu_used=0;
    S.project_readiness=calcProjectReadiness();
    S.dissociation_risk=checkDissociationRisk();
    S.anchor_dismissed_count=0;
    S.anchor_soft_lock=false;
    S.screen="main";S.tab="plan";
    S.checkin_submitted_at=Date.now();
    S.wakeup_check_dismissed=false;
    S.wakeup_check_done=false;
    render();
    syncToday();
    // v10.3: auto morning briefing if AI companion enabled
    if(aiEnabled()){
      setTimeout(async()=>{
        try{
          const ctx=buildCompanionContext();
          const sysPrompt=buildCompanionSystemPrompt()+"\n\nContext:\n"+ctx;
          S.ai_messages=[...(S.ai_messages||[])];
          const reply=await callCompanionAPI([{role:"user",content:"Give me a brief morning summary: what does today look like based on my check-in, what are the key risks, and one thing to watch for."}],sysPrompt);
          S.ai_morning_brief=reply;
          render();
        }catch(e){console.warn("Morning brief failed:",e.message);}
      },1500);
    }
  });
}

// ── FORECAST STRIP (v4.3) ─────────────────────────
function renderForecastStrip(){
  const today=todayStr();
  const days=[];
  for(let i=0;i<S.forecast_days;i++){
    const d=i===0?today:dateAddDays(today,i);
    days.push(d);
  }
  const mods=calcBankingModifiers(EVENTS,today,dateAddDays(today,S.forecast_days));
  const maxEU=DEFAULT_EU.high;

  const cols=days.map(d=>{
    const eu=d===today?S.eu_budget:forecastEuForDate(d);
    const phase=calcPhaseForDate(d);
    const evs=getEventsForDate(d);
    const pct=Math.round((eu/maxEU)*100);
    const barColor=eu>=12?"#34d399":eu>=8?"#fbbf24":"#f87171";
    const isToday=d===today;
    const icons=[];
    if(evs.length)icons.push(EVENT_TYPE_ICONS[evs[0].type]||"📌");
    if(phase==="Late luteal")icons.push("🌒");
    if(mods[d]&&mods[d]<1)icons.push("↓");
    return {d,eu,pct,barColor,isToday,icons,evs,phase};
  });

  return `<div class="in" style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <h3>Energy forecast</h3>
      <button id="toggle-forecast" style="background:none;border:none;color:var(--accent);font-size:.75rem;cursor:pointer">${S.forecast_days===7?"Show 2 weeks":"Show 1 week"}</button>
    </div>
    <div class="forecast-strip" id="forecast-strip">
      ${cols.map(c=>`
        <div class="forecast-day${c.isToday?" today-col":""}" data-date="${c.d}" title="${c.d}">
          <div class="forecast-bar-wrap">
            <div class="forecast-bar" style="height:${Math.max(10,c.pct)}%;background:${c.barColor}"></div>
          </div>
          <div class="forecast-label">${c.isToday?"Today":dayOfWeekShort(c.d)}</div>
          <div class="forecast-date">${new Date(c.d+"T12:00:00").getDate()}</div>
          <div class="forecast-icons">${c.icons.join("")}</div>
        </div>
      `).join("")}
    </div>
    <div style="display:flex;gap:16px;margin-top:6px;font-size:.65rem;color:var(--muted)">
      <span>🟢 ≥12 EU</span><span>🟡 8–11 EU</span><span>🔴 &lt;8 EU</span>
      <span>↓ banking</span><span>🌒 late luteal</span>
    </div>
  </div>`;
}

// ── ACTIVITY LOG (v8.2) ───────────────────────────

  if(!S.activity_log||!S.activity_log.length)return "";
  // Default to open when there are items (user needs to see their log)
  const open=S.show_activity_log!==false;
  const total=S.activity_log.reduce((s,e)=>s+e.cost,0);
  return `<div class="card in" style="margin-bottom:14px">

    ${open?`<div style="margin-top:10px">
      ${S.activity_log.slice().reverse().map(entry=>`

}

      <div style="flex:1">
        <div style="font-size:.8rem;font-weight:500;color:var(--accent)">Resting — task buttons locked</div>

      <button id="btn-skip-rest" style="background:none;border:none;color:var(--muted);font-size:.75rem;cursor:pointer">Skip</button>

    ${euPct()>=100?`<div class="overexertion-banner" style="background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25)"><span>🔴</span><span style="font-size:.8rem;color:var(--red)">EU budget reached — rest now</span></div>`:""}
    <h3 style="margin-bottom:4px">Activity planner</h3>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <p style="color:var(--muted);font-size:.78rem;margin:0">Tap to log. ${rem<0?`<strong style="color:var(--red)">${Math.abs(rem)} EU drawn from tomorrow</strong>`:`Remaining: <strong style="color:${euColor()}">${rem} EU</strong>`}${ortho?" · ⚠ Orthostatic adjustments active":""}</p>
      <button id="btn-log-past" style="background:none;border:none;color:var(--accent);font-size:.72rem;cursor:pointer;white-space:nowrap;padding:0 0 0 10px">⏱ Log past</button>
    </div>
    ${S.ci&&S.ci.taha_hinengaro?`<div style="display:flex;gap:8px;margin-bottom:12px;font-size:.68rem;color:var(--muted);flex-wrap:wrap">
      <span>CU: <strong style="color:${(S.cu_budget-S.cu_used)<=1?"var(--red)":(S.cu_budget-S.cu_used)<=2?"var(--yellow)":"var(--green)"}">${Math.max(0,S.cu_budget-S.cu_used)} left</strong></span>
      <span style="color:var(--border)">·</span>
      <span>🔵 Structural</span><span>🟢 Execution</span><span>⚪ Passive</span>
    </div>`:""}
    ${S.anchor_soft_lock?`<div style="background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.2);border-radius:10px;padding:8px 12px;margin-bottom:12px;font-size:.75rem;color:var(--yellow)">Structural tasks paused — a 10-minute break first would help.</div>`:""}

      const allTiers = getAllTiers(name);
      const hasTiers = allTiers.length > 0;
      const expanded = !!S.task_expanded[name];

      if(!hasTiers){
        // Single-tier task — original behaviour
        const cost = isAdj ? Math.ceil(baseCost*1.5) : baseCost;
        const canDo = rem>=cost && !cutoff && S.rest_timer===null && euPct()<100;
        return `<div class="card-sm in" style="margin-bottom:7px;opacity:${canDo&&!cogLock?1:.55}">

// Layer definitions
const LAYERS = {
  rock:   {label:"Rock",   desc:"Fixed — appointments & restorative practices",   drag:"warn",  committedEu:true},
  pebble: {label:"Pebble", desc:"Flexible — reducible, moveable tasks",            drag:"free",  committedEu:false},
  sand:   {label:"Sand",   desc:"Necessities — shower, meals, meds, dressing",    drag:"free",  committedEu:true},
  gap:    {label:"Gap",    desc:"Protected rest — minimum 30 min, not deletable", drag:"resize",committedEu:false},
  water:  {label:"Water",  desc:"Unplanned — retrospective annotation only",      drag:"none",  committedEu:false},
};

// Which tasks are Sand (committed EU necessities) — meals moved to pebble (v10.3 F7)
const SAND_TASK_NAMES = new Set([
  "Shower","Getting dressed","Medication prep",
]);

// Default gap block duration (minutes)
const GAP_DEFAULT_MINS = 45;

// Load/save layer colours from localStorage
function loadLayerColours(){
  try{
    const stored=JSON.parse(localStorage.getItem("pac_layer_colours")||"null");
    if(stored&&stored.rock&&stored.pebble&&stored.sand&&stored.gap&&stored.water){
      S.layer_colours=stored;
      S.canvas_colour_setup_done=true;
    }
  }catch(e){}
}
function saveLayerColours(){
  try{localStorage.setItem("pac_layer_colours",JSON.stringify(S.layer_colours));}catch(e){}
}

// Get colour for a layer with alpha
function layerCol(layer, alpha=1){
  const hex=S.layer_colours[layer]||(layer==="rock"?"#a78bfa":layer==="pebble"?"#34d399":layer==="sand"?"#fb923c":layer==="gap"?"#93c5fd":"#6ee7b7");
  // Convert hex to rgb for alpha support
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return alpha<1 ? `rgba(${r},${g},${b},${alpha})` : hex;
}

// Build canvas blocks for a given date from EVENTS + defaults
function buildCanvasBlocksForDate(dateStr){
  const isToday = dateStr===todayStr();
  const gate = isToday ? (S.gate||"green") : "green";
  const blocks=[];

  // 1. Rock blocks: scheduled EVENTS on this date (using getEventsForDate for spread support)
  const dayEvents = getEventsForDate(dateStr).sort((a,b)=>(a.start_time||"99:99").localeCompare(b.start_time||"99:99"));
  dayEvents.forEach(ev=>{
    const isRestorative = RESTORATIVE_PRACTICES.some(p=>p.name===ev.title||p.id===ev.template_id);
    const rp = isRestorative ? RESTORATIVE_PRACTICES.find(p=>p.name===ev.title||p.id===ev.template_id) : null;
    // For day-1 of spread events, show per-day cost
    const spread = (!ev._spread_virtual && ev.spread_days>1) ? ev.spread_days : 1;
    const perDayEu = spread>1 ? Math.round((ev.eu_cost/spread)*10)/10 : (ev.eu_cost||0);
    blocks.push({
      id:"ev_"+ev.id,
      event_id:ev._spread_virtual ? ev.id.replace(/_spread_\d+$/,"") : ev.id,
      title:ev.title,
      layer: isRestorative?"rock":"rock",
      eu_cost: perDayEu,
      return_eu: rp?.return_eu||0,
      return_note: rp?.return_note||"",
      restorative: isRestorative,
      start_time: ev.start_time||null,
      end_time: ev.end_time||null,
      location: ev.location||null,
      duration_mins: Math.round((perDayEu||2)*25),
      tethered: false,
      done: false,
    });
  });

  // 2. Pebble blocks: daily necessities — meals are pebble (F7), shower/dressing remain sand
  if(isToday){
    // Shower + dressed = sand (committed necessities)
    [{name:"Shower",eu:getDefaultTier("Shower",gate)?.eu??3},{name:"Getting dressed",eu:getDefaultTier("Getting dressed",gate)?.eu??1}].forEach((item,i)=>{
      blocks.push({id:`sand_${item.name.replace(/\s/g,"_")}`,title:item.name,layer:"sand",eu_cost:item.eu,return_eu:0,return_note:"",restorative:false,start_time:null,duration_mins:Math.round(item.eu*20),tethered:false,done:false});
    });
    // Meals = pebble (F7: nervous system regulation, important but flexible/reducible)
    const mealEu = getDefaultTier("Meal prep — light",gate)?.eu??1;
    ["breakfast","lunch","dinner"].forEach((meal,r)=>{
      blocks.push({
        id:`pebble_meal_${meal}`,
        title:`Meal prep — light (${meal})`,
        layer:"pebble",
        eu_cost:mealEu,
        return_eu:0, return_note:"",
        restorative:false,
        start_time:null, duration_mins:Math.round(mealEu*20),
        tethered:false, done:false,
      });
    });
  }

  // 3. Gap block: one default rest gap per day — layer pebble (F6)
  blocks.push({
    id:"gap_default_"+dateStr,
    title:"Rest gap",
    layer:"pebble",
    eu_cost:0, return_eu:0, return_note:"",
    restorative:false,
    start_time:null, duration_mins:GAP_DEFAULT_MINS,
    tethered:false, done:false,
  });

  // 4. Apply tethering: pebble immediately before a rock gets tethered
  // (future: detect by start_time proximity — skip for now, flag available)

  return blocks;
}

// Build the unscheduled pool for a date/gate
function buildUnscheduledPool(dateStr, gate, placedBlocks){
  const placedTitles=new Set(placedBlocks.map(b=>b.title));
  const pool=[];

  // Pebble tasks from TASK_TIERS_DEFAULT not already placed and not Sand
  Object.keys(TASK_TIERS_DEFAULT).forEach(taskName=>{
    if(SAND_TASK_NAMES.has(taskName))return;
    if(placedTitles.has(taskName))return;
    if(RESTORATIVE_PRACTICES.some(p=>p.name===taskName))return;
    const tier=getDefaultTier(taskName,gate);
    if(!tier)return;
    // Filter by gate for pool
    if(gate==="red"&&tier.eu>2)return;
    pool.push({
      id:"pool_pebble_"+taskName.replace(/\s/g,"_"),
      title:taskName,
      layer:"pebble",
      eu_cost:tier.eu, tier_label:tier.label,
      return_eu:0, return_note:"",
      restorative:false, duration_mins:Math.round(tier.eu*25)||20,
    });
  });

  // Due maintenance tasks not already in pool or placed (Fix v10.1 #1)
  const pebbleTitles = new Set(pool.map(p=>p.title)); // titles already in pool
  const SAND_MAINTENANCE_IDS = new Set(["shower","meal_prep"]); // skip — already sand blocks
  getMaintenanceDue().forEach(task=>{
    if(!task.isDue) return;
    if(SAND_MAINTENANCE_IDS.has(task.id)) return;
    // Avoid duplicating tasks already in TASK_TIERS_DEFAULT pool
    // "Dishes" in maintenance == "Dishwashing block" in task tiers
    const alreadyInPool = pebbleTitles.has(task.title) ||
      (task.title==="Dishes" && pebbleTitles.has("Dishwashing block")) ||
      (task.title==="Dishwashing block" && pebbleTitles.has("Dishes")) ||
      placedTitles.has(task.title);
    if(alreadyInPool) return;
    pool.push({
      id:"pool_maint_"+task.id,
      title:task.title,
      layer:"pebble",
      eu_cost:task.eu_cost,
      tier_label:task.isOverdue?"Overdue":"Due today",
      return_eu:0, return_note:"",
      restorative:false,
      duration_mins:Math.round(task.eu_cost*25)||20,
      maintenance_id:task.id,
    });
  });

  // Restorative practices — always in pool, multiple per day allowed (Part 7f v10.4)
  RESTORATIVE_PRACTICES.forEach(rp=>{
    if(!practiceGateSafe(rp,gate))return;
    const tier=getDefaultTier(rp.name,gate);
    pool.push({
      id:"pool_rp_"+rp.id,
      title:rp.name,
      layer:"rock",
      eu_cost:tier?.eu??rp.eu_cost,
      return_eu:rp.return_eu,
      return_note:rp.return_note,
      restorative:true, duration_mins:Math.round((tier?.eu??rp.eu_cost)*30)||30,
    });
  });

  return pool;
}

// Calculate 3-part EU for a date
function calcCanvasEu(dateStr, blocks){
  const isToday=dateStr===todayStr();
  const total = isToday ? S.eu_budget : forecastEuForDate(dateStr);

  // Committed = Rock + Sand blocks
  const committed = blocks
    .filter(b=>LAYERS[b.layer]?.committedEu)
    .reduce((s,b)=>s+(b.eu_cost||0),0);

  const discretionary = Math.max(0, total - committed);
  const overloaded = committed >= total;
  return {total, committed, discretionary, overloaded};
}

// Day-level EU summary for week view
function calcWeekDayEu(dateStr){
  const blocks = buildCanvasBlocksForDate(dateStr);
  return calcCanvasEu(dateStr, blocks);
}

// Format time slot label (hour lines for day view)
function slotLabel(h){
  if(h===0)return"12 am";
  if(h<12)return h+" am";
  if(h===12)return"12 pm";
  return(h-12)+" pm";
}

          }).join("")}
          ${pebbleChips.map(b=>`<div style="display:inline-flex;align-items:center;gap:4px;background:${layerCol(b.layer,0.10)};border:1px solid ${layerCol(b.layer,0.25)};border-radius:6px;padding:3px 7px;font-size:.7rem;color:var(--subtle);opacity:${layerFilter==="all"&&b.layer==="sand"?".7":"1"}">

    }).join("")}
    <p style="font-size:.68rem;color:var(--muted);margin-top:4px;text-align:center">Projections from today's profile. Actuals depend on morning check-ins.</p>
  </div>`;
}

// Helper — estimate cycle phase for a future date from profile
function estimatePhaseForDate(dateStr){
  if(!PROFILE||!PROFILE.last_period_start||!PROFILE.cycle_length)return null;
  const cycleLen=Number(PROFILE.cycle_length)||28;
  const lps=new Date(PROFILE.last_period_start+"T12:00");
  const target=new Date(dateStr+"T12:00");
  const daysSince=Math.floor((target-lps)/(86400000));
  const dayInCycle=((daysSince%cycleLen)+cycleLen)%cycleLen;
  if(dayInCycle<5)return "Menstruation";
  if(dayInCycle<13)return "Follicular";
  if(dayInCycle<16)return "Ovulation";
  if(dayInCycle<cycleLen-5)return "Luteal";
  return "Late luteal";
}

                <button class="btn-edit-event" data-id="${e.id}" style="background:none;border:none;color:var(--muted);font-size:.8rem;cursor:pointer;padding:4px">✏️</button>
